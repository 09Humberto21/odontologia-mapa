<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Estudio — Odontología</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

/* ═══════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════ */
:root{
  --fs-xs:.68rem;--fs-sm:.78rem;--fs-base:.88rem;--fs-md:1rem;--fs-lg:1.15rem;--fs-xl:1.35rem;--fs-2xl:1.8rem;--fs-3xl:clamp(2rem,5vw,3rem);
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--sp-12:48px;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;--r-full:50px;
  --z-base:1;--z-sticky:10;--z-dropdown:100;--z-modal:1000;--z-overlay:2000;--z-top:3000;--z-system:5000;
  --touch-min:44px;
  --max-w:1400px;
  --bg:#06060c;--bg2:#0d0d16;--bg3:#0e0e1a;--bg4:#0c0c17;--bg5:#0b0b16;
  --surface:#12121e;--card:#0f0f1a;--card-border:#1e1e30;--card-hover:#2a2a40;
  --text:#f0f0f5;--text2:#d0d0dd;--text3:#aaa;--text4:#777;--text5:#555;--text6:#444;--text7:#333;
  --input-bg:#0a0a14;--input-border:#222238;
  --bar-bg:#1a1a2e;--line:#181828;--line2:#222238;
  --code-bg:#141422;--pre-bg:#0a0a14;
  --scroll-track:#0a0a14;--scroll-thumb:#2a2a3e;
  --glow:0 0 30px rgba(124,58,237,.08);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow-md:0 8px 30px rgba(0,0,0,.4);
  --shadow-lg:0 20px 60px rgba(0,0,0,.6);
  --shadow-glow:0 0 40px rgba(124,58,237,.12);
}
html.light{
  --bg:#f2f2f7;--bg2:#fff;--bg3:#f7f7fc;--bg4:#f5f5fa;--bg5:#f0f0f8;
  --surface:#fff;--card:#fff;--card-border:#e4e4ed;--card-hover:#ccc;
  --text:#111;--text2:#2a2a35;--text3:#555;--text4:#888;--text5:#aaa;--text6:#ccc;--text7:#ddd;
  --input-bg:#f5f5fa;--input-border:#d0d0dd;
  --bar-bg:#e0e0e8;--line:#e8e8f0;--line2:#d0d0dd;
  --code-bg:#eeeef5;--pre-bg:#f5f5fa;
  --scroll-track:#eee;--scroll-thumb:#ccc;
  --glow:0 0 30px rgba(124,58,237,.05);
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 8px 30px rgba(0,0,0,.08);
  --shadow-lg:0 20px 60px rgba(0,0,0,.12);
  --shadow-glow:0 0 40px rgba(124,58,237,.06);
}

/* ═══════════════════════════════════════════
   RESET + BASE
   ═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}

/* ═══════════════════════════════════════════
   HEADER — Glassmorphism redesign
   ═══════════════════════════════════════════ */
/* Header replaced by V4 navbar */
.header-btn{background:var(--surface);color:var(--text2);border:1px solid var(--card-border);padding:var(--sp-3) var(--sp-5);border-radius:var(--r-full);font-size:var(--fs-sm);font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:var(--sp-2);min-height:var(--touch-min);font-family:'Inter',sans-serif}
.header-btn:hover{background:var(--card-hover);border-color:var(--card-hover);transform:translateY(-1px);box-shadow:var(--shadow-sm)}

/* ═══════════════════════════════════════════
   SEARCH BAR — Floating pill
   ═══════════════════════════════════════════ */
.search-bar{display:flex;justify-content:center;padding:var(--sp-5) var(--sp-5) var(--sp-8)}
.search-bar input{width:100%;max-width:520px;padding:var(--sp-4) var(--sp-6);border-radius:var(--r-full);border:1px solid var(--card-border);background:var(--surface);color:var(--text);font-size:var(--fs-base);outline:none;transition:all .3s;box-shadow:var(--shadow-sm);font-family:'Inter',sans-serif;min-height:var(--touch-min)}
.search-bar input:focus{border-color:#7c3aed;box-shadow:var(--shadow-glow)}
.search-bar input::placeholder{color:var(--text6)}

/* ═══════════════════════════════════════════
   PROGRESS SECTION — Glowing cards
   ═══════════════════════════════════════════ */
/* Progress replaced by V4 pills */

/* ═══════════════════════════════════════════
   MAIN GRID — Cards
   ═══════════════════════════════════════════ */
.main-grid{max-width:var(--max-w);margin:0 auto;padding:0 var(--sp-6) var(--sp-12);display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:var(--sp-5)}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--r-xl);overflow:hidden;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.5}
.card-header{padding:var(--sp-5) var(--sp-6);display:flex;align-items:center;gap:var(--sp-4);cursor:pointer;position:relative}
.card-header::after{content:'';position:absolute;bottom:0;left:var(--sp-6);right:var(--sp-6);height:1px;background:var(--line)}
.icon-wrap{width:56px;height:56px;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;transition:transform .3s}
.card:hover .icon-wrap{transform:scale(1.05)}
.card-title{font-size:var(--fs-lg);font-weight:800;letter-spacing:-.3px}
.card-subtitle{font-size:var(--fs-xs);color:var(--text5);margin-top:var(--sp-1);font-weight:500}
.card-badge{margin-left:auto;padding:var(--sp-1) var(--sp-3);border-radius:var(--r-full);font-size:var(--fs-xs);font-weight:700;text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}

/* ═══════════════════════════════════════════
   TOPICS — Inside cards
   ═══════════════════════════════════════════ */
.topics{padding:var(--sp-4) var(--sp-6) var(--sp-5)}
.topic-item{padding:var(--sp-3) 0 var(--sp-4);border-bottom:1px solid var(--line);transition:all .2s}
.topic-item:last-child{border-bottom:none}
.topic-dot{width:9px;height:9px;border-radius:50%;margin-top:7px;flex-shrink:0}
.topic-text{flex:1}
.topic-name{font-size:var(--fs-md);font-weight:700;color:var(--text2);line-height:1.4}
.topic-desc{font-size:var(--fs-sm);color:var(--text4);margin-top:3px;line-height:1.5}
.topic-actions{display:flex;align-items:center;gap:var(--sp-2);margin-top:var(--sp-3);flex-wrap:wrap}
.tag{font-size:var(--fs-xs);padding:3px var(--sp-3);border-radius:var(--r-full);background:var(--line);color:var(--text4);white-space:nowrap;font-weight:600}
.tag-alta{background:rgba(239,68,68,.12)!important;color:#f87171!important}
.tag-media{background:rgba(245,158,11,.12)!important;color:#fbbf24!important}
.tag-base{background:rgba(34,197,94,.12)!important;color:#4ade80!important}

/* ═══════════════════════════════════════════
   ACTION BUTTONS — Redesigned
   ═══════════════════════════════════════════ */
.action-btn{font-size:var(--fs-xs);padding:var(--sp-2) var(--sp-3);border-radius:var(--r-md);border:none;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:var(--sp-1);transition:all .2s;color:#fff;letter-spacing:.3px;min-height:34px;font-family:'Inter',sans-serif}
.action-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.action-btn.outline{background:transparent!important;border:1.5px solid}
.notes-toggle{background:none;border:none;font-size:var(--fs-sm);cursor:pointer;color:var(--text5);padding:var(--sp-1) var(--sp-2);border-radius:var(--r-sm);transition:color .2s}
.notes-toggle:hover{color:var(--text3)}

/* ═══════════════════════════════════════════
   CONSOLA IA — Chat-like
   ═══════════════════════════════════════════ */
.ia-console{margin:var(--sp-3) 0 var(--sp-1);display:none;animation:fadeIn .25s ease}
.ia-console.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ia-input-row{display:flex;gap:var(--sp-2);align-items:flex-end}
.ia-input-row textarea{flex:1;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--r-full);color:var(--text);font-family:'Inter',sans-serif;font-size:var(--fs-sm);padding:var(--sp-3) var(--sp-5);resize:none;min-height:var(--touch-min);max-height:120px;outline:none;transition:border .2s}
.ia-input-row textarea:focus{border-color:var(--accent,#7c3aed)}
.ia-input-row textarea::placeholder{color:var(--text6)}
.ia-send-btn{padding:var(--sp-3) var(--sp-5);border-radius:var(--r-full);border:none;cursor:pointer;font-size:var(--fs-sm);font-weight:700;color:#fff;white-space:nowrap;display:flex;align-items:center;gap:var(--sp-1);transition:all .2s;min-height:var(--touch-min);font-family:'Inter',sans-serif}
.ia-send-btn:hover{opacity:.85;transform:translateY(-1px)}
.ia-send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ═══════════════════════════════════════════
   MARKDOWN RESPONSES — Rich text
   ═══════════════════════════════════════════ */
.ia-response,.lab-body .md-content,.lab-body{font-size:var(--fs-base);color:var(--text3);line-height:1.75;overflow-x:auto}
.ia-response{margin-top:var(--sp-3);background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-lg);padding:var(--sp-4) var(--sp-5);display:none}
.ia-response.visible{display:block}
.ia-response h1,.ia-response h2,.ia-response h3,.lab-body h1,.lab-body h2,.lab-body h3{color:var(--text);margin:var(--sp-5) 0 var(--sp-3);font-weight:800}
.ia-response h1,.lab-body h1{font-size:var(--fs-lg);border-bottom:1px solid var(--line);padding-bottom:var(--sp-2)}
.ia-response h2,.lab-body h2{font-size:var(--fs-md)}
.ia-response h3,.lab-body h3{font-size:var(--fs-base)}
.ia-response p,.lab-body p{margin:var(--sp-2) 0}
.ia-response ul,.ia-response ol,.lab-body ul,.lab-body ol{margin:var(--sp-2) 0 var(--sp-2) var(--sp-5)}
.ia-response li,.lab-body li{margin:var(--sp-1) 0}
.ia-response em,.lab-body em{color:#a78bfa;font-style:italic}
.ia-response strong,.lab-body strong{color:var(--text)}
.ia-response code,.lab-body code{background:var(--code-bg);padding:2px var(--sp-2);border-radius:var(--r-sm);font-size:var(--fs-sm);color:#fbbf24}
.ia-response pre,.lab-body pre{background:var(--pre-bg);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-4);margin:var(--sp-3) 0;overflow-x:auto}
.ia-response pre code,.lab-body pre code{background:none;padding:0;color:var(--text3)}
.ia-response blockquote,.lab-body blockquote{border-left:3px solid var(--accent,#7c3aed);padding:var(--sp-3) var(--sp-4);margin:var(--sp-3) 0;background:var(--pre-bg);border-radius:0 var(--r-md) var(--r-md) 0;color:var(--text4)}
.ia-response table,.lab-body table{width:100%;border-collapse:collapse;margin:var(--sp-3) 0;font-size:var(--fs-sm)}
.ia-response th,.lab-body th{background:var(--code-bg);padding:var(--sp-3);text-align:left;font-weight:700;color:var(--text);border-bottom:2px solid var(--line2)}
.ia-response td,.lab-body td{padding:var(--sp-2) var(--sp-3);border-bottom:1px solid var(--line);color:var(--text3)}
.ia-response tr:hover td,.lab-body tr:hover td{background:var(--bg3)}
.ia-response hr,.lab-body hr{border:none;border-top:1px solid var(--line);margin:var(--sp-4) 0}
.ia-thinking{display:inline-flex;align-items:center;gap:var(--sp-2);color:var(--text5);font-size:var(--fs-sm)}
.ia-thinking span{width:5px;height:5px;border-radius:50%;background:var(--text5);animation:pulse 1.2s infinite}
.ia-thinking span:nth-child(2){animation-delay:.2s}
.ia-thinking span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ═══════════════════════════════════════════
   NOTES
   ═══════════════════════════════════════════ */
.notes-section{display:none;margin-top:var(--sp-2);animation:fadeIn .2s}
.notes-section.open{display:block}
.notes-section textarea{width:100%;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--r-md);color:var(--text3);font-family:'Inter',sans-serif;font-size:var(--fs-sm);padding:var(--sp-3);resize:vertical;min-height:60px;outline:none;transition:border .2s}
.notes-section textarea:focus{border-color:var(--accent,#7c3aed)}

/* ═══════════════════════════════════════════
   OVERLAY / MODAL SYSTEM — Unified
   ═══════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);z-index:var(--z-overlay);display:none;align-items:center;justify-content:center;padding:var(--sp-5)}
.overlay.active{display:flex}
.overlay.bg-dark{background:rgba(4,4,10,.92)}
.panel{border-radius:var(--r-xl);width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:panelIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes panelIn{from{transform:translateY(20px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.panel-close{position:absolute;top:var(--sp-5);right:var(--sp-5);background:var(--line);border:none;color:var(--text4);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:var(--fs-md);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:5}
.panel-close:hover{background:var(--card-hover);color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(16px);z-index:var(--z-modal);display:none;align-items:center;justify-content:center;padding:var(--sp-5)}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--card-border);border-radius:var(--r-xl);max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:var(--sp-8);position:relative;animation:panelIn .3s ease;box-shadow:var(--shadow-lg)}
.modal-close{position:absolute;top:var(--sp-4);right:var(--sp-4);background:var(--line);border:none;color:var(--text4);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:var(--fs-md);display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--card-hover);color:var(--text)}

/* ═══════════════════════════════════════════
   LABORATORIO MODAL
   ═══════════════════════════════════════════ */
.lab-panel{background:var(--bg4);border:1px solid var(--card-border);max-width:850px;box-shadow:var(--shadow-lg)}
.lab-header{padding:var(--sp-6) var(--sp-6) var(--sp-5);position:sticky;top:0;background:var(--bg4);z-index:2;border-bottom:1px solid var(--line)}
.lab-badge{display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-4);border-radius:var(--r-full);font-size:var(--fs-xs);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:var(--sp-3)}
.lab-title{font-size:var(--fs-xl);font-weight:900;line-height:1.3;margin-bottom:var(--sp-2);letter-spacing:-.3px}
.lab-meta{font-size:var(--fs-sm);color:var(--text5)}
.lab-body{padding:var(--sp-6)}
.lab-loader{display:flex;flex-direction:column;align-items:center;gap:var(--sp-4);padding:var(--sp-12) var(--sp-5);color:var(--text5);font-size:var(--fs-base)}
.lab-spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════
   ATLAS — Image gallery
   ═══════════════════════════════════════════ */
.atlas-section{margin:var(--sp-6) 0}
.atlas-title{font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:2px;font-weight:800;margin-bottom:var(--sp-4);display:flex;align-items:center;gap:var(--sp-2)}
.atlas-title::after{content:'';flex:1;height:1px;background:var(--line)}
.atlas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--sp-4)}
.atlas-card{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all .3s;position:relative}
.atlas-card img{width:100%;height:200px;object-fit:cover;background:var(--bg);display:block}
.atlas-card svg{width:100%;height:200px;display:block}
.atlas-card .svg-placeholder{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,var(--bg3),var(--bg))}
.atlas-card .atlas-caption{padding:var(--sp-3)}
.atlas-card .atlas-caption-title{font-size:var(--fs-sm);font-weight:700;color:var(--text2);margin-bottom:2px}
.atlas-card .atlas-caption-desc{font-size:var(--fs-xs);color:var(--text5);line-height:1.4}
.atlas-card .atlas-caption-source{font-size:.62rem;color:var(--text7);margin-top:var(--sp-1);display:flex;align-items:center;gap:var(--sp-1)}
.atlas-card .atlas-caption-source a{color:var(--accent);text-decoration:none}
.atlas-tooltip{position:absolute;top:var(--sp-2);left:var(--sp-2);background:rgba(0,0,0,.85);color:#fff;font-size:var(--fs-xs);padding:var(--sp-1) var(--sp-3);border-radius:var(--r-sm);opacity:0;transition:opacity .2s;pointer-events:none;z-index:2;backdrop-filter:blur(8px)}
.atlas-card:hover .atlas-tooltip{opacity:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:var(--z-top);display:none;align-items:center;justify-content:center;padding:var(--sp-5);cursor:zoom-out}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:var(--r-lg);object-fit:contain;box-shadow:0 0 80px rgba(0,0,0,.8)}
.lightbox-caption{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--surface);padding:var(--sp-3) var(--sp-5);border-radius:var(--r-lg);font-size:var(--fs-base);color:var(--text3);max-width:600px;text-align:center;border:1px solid var(--line)}

/* ═══════════════════════════════════════════
   CITATIONS
   ═══════════════════════════════════════════ */
.citations-section{margin:var(--sp-6) 0}
.citation-item{display:flex;gap:var(--sp-3);padding:var(--sp-3);background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:var(--sp-3);transition:all .2s}
.citation-item:hover{border-color:var(--card-hover)}
.citation-num{width:30px;height:30px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:var(--fs-sm);font-weight:800;flex-shrink:0}
.citation-body{flex:1}
.citation-title{font-size:var(--fs-base);font-weight:700;color:var(--text2);margin-bottom:2px;line-height:1.4}
.citation-title a{color:inherit;text-decoration:none}
.citation-title a:hover{color:var(--accent);text-decoration:underline}
.citation-authors{font-size:var(--fs-xs);color:var(--text5)}
.citation-journal{font-size:var(--fs-xs);color:var(--text6);display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap;margin-top:var(--sp-1)}
.citation-journal .pmid{color:var(--accent);font-weight:700}
.citation-journal a{color:var(--accent);text-decoration:none;font-weight:600}

/* ═══════════════════════════════════════════
   QUIZ
   ═══════════════════════════════════════════ */
.quiz-panel{background:var(--bg5);border:1px solid var(--card-border);max-width:720px;box-shadow:var(--shadow-lg)}
.quiz-header{padding:var(--sp-6);position:sticky;top:0;background:var(--bg5);z-index:2;border-bottom:1px solid var(--line)}
.quiz-badge{display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-4);border-radius:var(--r-full);font-size:var(--fs-xs);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:var(--sp-3)}
.quiz-progress-bar{height:6px;background:var(--bar-bg);border-radius:3px;margin-top:var(--sp-4);overflow:hidden}
.quiz-progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.quiz-progress-text{font-size:var(--fs-xs);color:var(--text5);margin-top:var(--sp-2);text-align:right;font-weight:600}
.quiz-body{padding:var(--sp-6)}
.quiz-loader{display:flex;flex-direction:column;align-items:center;gap:var(--sp-4);padding:var(--sp-12) var(--sp-5);color:var(--text5)}
.quiz-question{margin-bottom:var(--sp-6)}
.quiz-q-number{font-size:var(--fs-xs);font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:var(--sp-3)}
.quiz-q-text{font-size:var(--fs-md);font-weight:700;line-height:1.6;color:var(--text2);margin-bottom:var(--sp-4)}
.quiz-q-text em{color:#a78bfa}
.quiz-options{display:flex;flex-direction:column;gap:var(--sp-3)}
.quiz-opt{background:var(--bg3);border:2px solid var(--line);border-radius:var(--r-lg);padding:var(--sp-4) var(--sp-5);cursor:pointer;transition:all .2s;display:flex;gap:var(--sp-3);align-items:flex-start;font-size:var(--fs-base);color:var(--text3);line-height:1.6;min-height:52px}
.quiz-opt:hover:not(.locked){border-color:var(--card-hover);background:var(--surface)}
.quiz-opt.selected{border-color:var(--accent);background:var(--surface)}
.quiz-opt.correct{border-color:#22c55e!important;background:rgba(34,197,94,.06)!important}
.quiz-opt.correct .opt-letter{background:#22c55e;color:#000}
.quiz-opt.wrong{border-color:#ef4444!important;background:rgba(239,68,68,.06)!important}
.quiz-opt.wrong .opt-letter{background:#ef4444;color:#000}
.quiz-opt.locked{cursor:default;opacity:.6}
.quiz-opt.locked.correct,.quiz-opt.locked.wrong{opacity:1}
.opt-letter{width:30px;height:30px;border-radius:var(--r-md);background:var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:var(--fs-sm);flex-shrink:0;transition:all .2s}
.opt-text{flex:1}.opt-text em{color:#a78bfa}
.quiz-explanation{margin-top:var(--sp-3);padding:var(--sp-4);background:var(--pre-bg);border-left:3px solid var(--accent);border-radius:0 var(--r-md) var(--r-md) 0;font-size:var(--fs-base);color:var(--text4);line-height:1.65;display:none}
.quiz-explanation.visible{display:block}
.quiz-explanation em{color:#a78bfa}.quiz-explanation strong{color:var(--text)}
.quiz-nav{display:flex;justify-content:space-between;margin-top:var(--sp-6);padding-top:var(--sp-5);border-top:1px solid var(--line)}
.quiz-nav-btn{padding:var(--sp-3) var(--sp-6);border-radius:var(--r-lg);border:none;cursor:pointer;font-size:var(--fs-base);font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:var(--sp-2);min-height:var(--touch-min);font-family:'Inter',sans-serif}
.quiz-nav-btn:hover{transform:translateY(-1px)}
.quiz-nav-btn:disabled{opacity:.25;cursor:not-allowed;transform:none}
.quiz-nav-btn.primary{color:#fff}
.quiz-nav-btn.sec{background:var(--line);color:var(--text4);border:1px solid var(--line2)}
.quiz-nav-btn.sec:hover{color:var(--text);background:var(--card-hover)}

/* Results */
.quiz-results{text-align:center;padding:var(--sp-5) 0}
.results-score{font-size:4rem;font-weight:900;margin:var(--sp-4) 0 var(--sp-2);letter-spacing:-2px}
.results-label{font-size:var(--fs-md);color:var(--text4);margin-bottom:var(--sp-2)}
.results-msg{font-size:var(--fs-lg);font-weight:700;margin-bottom:var(--sp-6)}
.results-breakdown{text-align:left;margin-top:var(--sp-5)}
.rb-item{display:flex;align-items:flex-start;gap:var(--sp-3);padding:var(--sp-3) 0;border-bottom:1px solid var(--line);font-size:var(--fs-base)}
.rb-item:last-child{border-bottom:none}
.rb-icon{width:30px;height:30px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:var(--fs-sm);flex-shrink:0;font-weight:800}
.rb-icon.correct{background:rgba(34,197,94,.12);color:#4ade80}
.rb-icon.wrong{background:rgba(239,68,68,.12);color:#f87171}
.rb-text{flex:1;color:var(--text3)}.rb-text em{color:#a78bfa}
.rb-answer{font-size:var(--fs-sm);color:var(--text5);margin-top:var(--sp-1)}
.results-actions{display:flex;gap:var(--sp-3);justify-content:center;margin-top:var(--sp-6);flex-wrap:wrap}

/* ═══════════════════════════════════════════
   FULL MODALS (Progress, Exam, Calendar, etc)
   ═══════════════════════════════════════════ */
.full-modal{position:fixed;inset:0;background:rgba(4,4,10,.92);backdrop-filter:blur(20px);z-index:var(--z-overlay);display:none;align-items:center;justify-content:center;padding:var(--sp-5)}
.full-modal.active{display:flex}
.full-modal-panel{background:var(--surface);border:1px solid var(--card-border);border-radius:var(--r-xl);max-width:800px;width:100%;max-height:90vh;overflow-y:auto;padding:var(--sp-8);position:relative;animation:panelIn .35s ease;box-shadow:var(--shadow-lg)}

/* Exam timer */
.exam-timer{position:fixed;top:var(--sp-5);right:var(--sp-5);background:var(--surface);border:1px solid var(--card-border);border-radius:var(--r-lg);padding:var(--sp-3) var(--sp-5);font-size:var(--fs-lg);font-weight:900;z-index:var(--z-top);box-shadow:var(--shadow-md);font-variant-numeric:tabular-nums}
.exam-timer.urgent{color:#ef4444;border-color:#ef4444;animation:timerPulse 1s infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Calendar */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:var(--sp-2);margin-top:var(--sp-4)}
.calendar-day{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-3);min-height:80px;font-size:var(--fs-xs)}
.calendar-day-header{font-weight:800;margin-bottom:var(--sp-1);color:var(--text4);text-transform:uppercase;letter-spacing:1px}
.calendar-topic{padding:2px var(--sp-2);border-radius:var(--r-sm);font-size:.62rem;font-weight:700;margin-top:var(--sp-1);display:block}

/* Flashcard */
.flashcard-container{perspective:1000px;width:100%;max-width:400px;margin:var(--sp-6) auto}
.flashcard{width:100%;height:280px;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);cursor:pointer;border-radius:var(--r-xl)}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;padding:var(--sp-8);text-align:center;border:2px solid var(--card-border)}
.flashcard-front{background:var(--card);font-size:var(--fs-md);font-weight:700;color:var(--text2);line-height:1.6}
.flashcard-back{background:var(--surface);transform:rotateY(180deg);font-size:var(--fs-base);color:var(--text3);line-height:1.7}
.flashcard-rating{display:flex;gap:var(--sp-3);justify-content:center;margin-top:var(--sp-5)}
.flashcard-rating button{padding:var(--sp-3) var(--sp-6);border-radius:var(--r-lg);border:none;cursor:pointer;font-size:var(--fs-base);font-weight:700;min-height:var(--touch-min);font-family:'Inter',sans-serif;transition:all .2s}
.flashcard-rating button:hover{transform:translateY(-2px)}

/* ═══════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════ */
.timeline-section{max-width:900px;margin:0 auto var(--sp-12);padding:0 var(--sp-5)}
.timeline-section h2{text-align:center;font-size:var(--fs-xs);color:var(--text5);text-transform:uppercase;letter-spacing:3px;margin-bottom:var(--sp-8);font-weight:700}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#7c3aed,#00d4ff,#22c55e,transparent)}
.timeline-item{position:relative;margin-bottom:var(--sp-6);padding-left:var(--sp-5)}
.timeline-item .tl-label{font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:1.5px;font-weight:800;margin-bottom:var(--sp-1)}
.timeline-item .tl-title{font-size:var(--fs-md);font-weight:700;color:var(--text2)}
.timeline-item .tl-desc{font-size:var(--fs-sm);color:var(--text5);margin-top:var(--sp-1)}

/* ═══════════════════════════════════════════
   SKELETON LOADER
   ═══════════════════════════════════════════ */
.skeleton{padding:var(--sp-6)}
.skeleton-line{height:14px;background:linear-gradient(90deg,var(--line) 25%,var(--line2) 50%,var(--line) 75%);background-size:200% 100%;border-radius:var(--r-sm);margin-bottom:var(--sp-3);animation:shimmer 1.5s infinite}
.skeleton-line:nth-child(1){width:85%}.skeleton-line:nth-child(2){width:92%}.skeleton-line:nth-child(3){width:78%}.skeleton-line:nth-child(4){width:60%;margin-bottom:var(--sp-5)}.skeleton-line:nth-child(5){width:88%}.skeleton-line:nth-child(6){width:95%}.skeleton-line:nth-child(7){width:72%}.skeleton-line:nth-child(8){width:80%}
.skeleton-line.short{width:45%}.skeleton-line.header{height:20px;width:55%;margin-bottom:var(--sp-4)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══════════════════════════════════════════
   SCROLLBAR
   ═══════════════════════════════════════════ */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--scroll-track)}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}

/* ═══════════════════════════════════════════
   INTERACTIONS — Press, Focus, Motion
   ═══════════════════════════════════════════ */
.action-btn:active,.header-btn:active,.quiz-nav-btn:active,.quiz-opt:active,.ia-send-btn:active{transform:scale(.97)!important;transition:transform 80ms ease}
:focus-visible{outline:2px solid var(--accent,#7c3aed);outline-offset:2px;border-radius:var(--r-sm)}
button:focus:not(:focus-visible),a:focus:not(:focus-visible){outline:none}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
@media(hover:hover){.card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:var(--card-hover)}.atlas-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}.progress-card:hover{transform:translateY(-4px);border-color:var(--card-hover)}}
@media(hover:none){.card:hover,.atlas-card:hover,.progress-card:hover{transform:none!important;box-shadow:none!important}}

/* ═══════════════════════════════════════════
   PRINT — Lab only
   ═══════════════════════════════════════════ */
@media print{
  body>*:not(#labOverlay){display:none!important}
  #labOverlay{display:block!important;position:static!important;background:#fff!important;backdrop-filter:none!important;padding:0!important;overflow:visible!important}
  #labOverlay .panel{max-height:none!important;overflow:visible!important;border:none!important;border-radius:0!important;box-shadow:none!important;max-width:100%!important}
  .lab-panel{background:#fff!important}
  .lab-header{background:#fff!important;position:static!important;border-bottom:2px solid #000!important;padding:20px 0!important}
  .lab-body{padding:20px 0!important}
  .lab-badge{background:#eee!important;color:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .lab-title{color:#000!important;font-size:1.4rem!important}
  .lab-meta{color:#555!important}
  .md-content,.lab-body{color:#222!important;font-size:11pt!important;line-height:1.6!important}
  .md-content h1,.md-content h2,.md-content h3{color:#000!important}
  .md-content em{color:#333!important}
  .md-content code{background:#eee!important;color:#333!important}
  .md-content blockquote{border-left:3px solid #333!important;background:#f5f5f5!important;color:#333!important}
  .atlas-section{page-break-before:always}
  .atlas-grid{grid-template-columns:repeat(2,1fr)!important}
  .atlas-card{border:1px solid #ddd!important;background:#fafafa!important}
  .atlas-tooltip{display:none!important}
  .citations-section{page-break-before:always}
  .citation-item{background:#fafafa!important;border:1px solid #ddd!important;break-inside:avoid}
  .citation-title,.citation-title a{color:#000!important}
  .panel-close,.action-btn,.header-actions,.search-bar,.progress-section,.main-grid,.timeline-section,.ia-console,.notes-section{display:none!important}
  header{display:none!important}
  a{color:#000!important}a[href]::after{content:" (" attr(href) ")";font-size:8pt;color:#666}
}

/* ═══════════════════════════════════════════
   RESPONSIVE — Mobile first
   ═══════════════════════════════════════════ */
@media(max-width:480px){
  header{flex-direction:column;align-items:center;text-align:center;padding:var(--sp-4) var(--sp-4) var(--sp-3)}
  header h1{font-size:var(--fs-lg)}
  .header-actions{justify-content:center;flex-wrap:wrap}
  .progress-grid{gap:var(--sp-3)}
  .progress-pill{min-width:130px;padding:var(--sp-2) var(--sp-3) var(--sp-2) var(--sp-2)}
  .pill-icon{width:26px;height:26px;font-size:.75rem}
  .pill-name{font-size:var(--fs-xs)}
  .header-btn{min-height:var(--touch-min);font-size:var(--fs-sm);padding:var(--sp-3) var(--sp-4)}
  .search-bar{padding:var(--sp-3) var(--sp-4) var(--sp-5)}
  .search-bar input{min-height:var(--touch-min)}
  .main-grid{grid-template-columns:1fr;gap:var(--sp-4);padding:0 var(--sp-3) var(--sp-12)}
  .card-header{padding:var(--sp-5) var(--sp-4) var(--sp-3)}
  .topics{padding:var(--sp-3) var(--sp-4) var(--sp-4)}
  .topic-actions{display:flex;overflow-x:auto;gap:var(--sp-2);padding-bottom:var(--sp-2);-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap!important}
  .topic-actions::-webkit-scrollbar{display:none}
  .topic-actions .tag,.topic-actions .action-btn{flex-shrink:0;white-space:nowrap}
  .action-btn{min-height:var(--touch-min);padding:var(--sp-3) var(--sp-4);font-size:var(--fs-sm)}
  /* Bottom sheet modals */
  .overlay .panel,.full-modal .full-modal-panel{max-width:100vw!important;width:100vw!important;max-height:92vh;border-radius:var(--r-xl) var(--r-xl) 0 0!important;align-self:flex-end;margin:0;animation:sheetUp .35s cubic-bezier(.32,.72,.24,1.02)!important}
  .overlay{align-items:flex-end!important;padding:0!important}
  .full-modal{padding:0!important;align-items:flex-end!important}
  .modal-overlay .modal{max-width:100vw;width:100vw;max-height:85vh;border-radius:var(--r-xl) var(--r-xl) 0 0;position:fixed;bottom:0;left:0;animation:sheetUp .35s cubic-bezier(.32,.72,.24,1.02)}
  .modal-overlay{align-items:flex-end;padding:0}
  .quiz-opt{min-height:52px;padding:var(--sp-4) var(--sp-5)}
  .quiz-nav-btn,.ia-send-btn{min-height:var(--touch-min)}
  .atlas-grid{grid-template-columns:1fr}
  .calendar-grid{grid-template-columns:repeat(3,1fr)}
  .full-modal-panel{padding:var(--sp-5)}
  .flashcard{height:220px}
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

@media(min-width:481px) and (max-width:768px){
  .main-grid{grid-template-columns:1fr;max-width:600px;margin-left:auto;margin-right:auto;padding:0 var(--sp-5) var(--sp-12)}
  .progress-grid{grid-template-columns:repeat(3,1fr)}
  .atlas-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:769px) and (max-width:1024px){
  .main-grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:1401px){
  .main-grid{grid-template-columns:repeat(3,1fr);max-width:1500px}
}

/* ═══════════════════════════════════════════
   V4: NAVBAR HEADER
   ═══════════════════════════════════════════ */
header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;padding:var(--sp-4) var(--sp-6);max-width:var(--max-w);margin:0 auto;position:relative;gap:var(--sp-3)}
header::before{display:none}
header h1{font-size:var(--fs-xl);margin:0;letter-spacing:-.5px;line-height:1;background:linear-gradient(135deg,#00d4ff,#7c3aed,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{display:none}
.header-actions{display:flex;gap:var(--sp-2);margin:0;flex-wrap:nowrap;align-items:center}
.search-bar{max-width:var(--max-w);margin:0 auto;padding:var(--sp-2) var(--sp-6) var(--sp-5)}
.search-bar input{max-width:100%}

/* ═══════════════════════════════════════════
   V4: PROGRESS PILLS (replacing grid)
   ═══════════════════════════════════════════ */
.progress-section{max-width:var(--max-w);margin:0 auto var(--sp-5);padding:0 var(--sp-6)}
.progress-section h2{display:none}
.progress-grid{display:flex;gap:var(--sp-3);overflow-x:auto;padding-bottom:var(--sp-2);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.progress-grid::-webkit-scrollbar{display:none}
.progress-pill{display:flex;flex-wrap:wrap;align-items:center;gap:var(--sp-2);background:var(--card);border:1px solid var(--card-border);border-radius:var(--r-lg);padding:var(--sp-2) var(--sp-4) var(--sp-2) var(--sp-3);cursor:pointer;transition:all .2s;flex-shrink:0;min-width:150px}
.progress-pill:hover{border-color:var(--card-hover);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.pill-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.pill-name{font-size:var(--fs-sm);font-weight:700;color:var(--text2);white-space:nowrap}
.pill-score{font-size:var(--fs-sm);font-weight:800;margin-left:auto;font-variant-numeric:tabular-nums}
.pill-bar{width:100%;height:3px;background:var(--bar-bg);border-radius:2px;overflow:hidden;margin-top:var(--sp-1)}
.pill-bar-fill{height:100%;border-radius:2px;transition:width 1s ease}

/* ═══════════════════════════════════════════
   V4: SECTION DIVIDERS
   ═══════════════════════════════════════════ */
.section-divider{display:flex;align-items:center;gap:var(--sp-4);max-width:var(--max-w);margin:0 auto var(--sp-5);padding:0 var(--sp-6);color:var(--text5);font-size:var(--fs-xs);font-weight:600;text-transform:uppercase;letter-spacing:2.5px}
.section-divider::before,.section-divider::after{content:"";flex:1;height:1px;background:var(--line)}

/* ═══════════════════════════════════════════
   V4: CARD ACCENT BAR
   ═══════════════════════════════════════════ */
.card-accent{height:3px;width:100%}
.card{position:relative;overflow:hidden}

/* ═══════════════════════════════════════════
   V4: COLLAPSIBLE TOPICS
   ═══════════════════════════════════════════ */
.topic-row{cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:var(--sp-4);transition:all .15s;padding:var(--sp-2) var(--sp-1)}
.topic-row:hover{padding-left:var(--sp-1)}
.topic-chevron{color:var(--text5);font-size:10px;transition:transform .25s ease;margin-left:auto;flex-shrink:0;padding:var(--sp-1);opacity:.4}
.topic-item.expanded .topic-chevron{transform:rotate(180deg)}
.topic-expand{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s;opacity:0;padding-left:var(--sp-5)}
.topic-item.expanded .topic-expand{max-height:600px;opacity:1}
.topic-actions{padding:var(--sp-3) 0 var(--sp-1) var(--sp-5)}

/* V4: Topic last score */
.topic-last-score{font-size:var(--fs-xs);color:var(--text6);margin-top:2px}

/* ═══════════════════════════════════════════
   V4: AUTO-GROW TEXTAREA
   ═══════════════════════════════════════════ */
.ia-input-row textarea,.notes-area textarea{resize:none!important;overflow:hidden;min-height:var(--touch-min);transition:border .2s}
.notes-area{display:none;margin-top:var(--sp-2)}
.notes-area.open{display:block}
.topic-notes{padding:var(--sp-2) 0 0 var(--sp-5)}

</style>
</head>
<body>
<header>
  <h1>🦷 Mapa de Estudio</h1>
  <div class="header-actions">
    <button class="header-btn" id="btnProgress">📊 Progreso</button>
    <button class="header-btn" id="btnExam">📝 Examen</button>
    <button class="header-btn" id="btnCalendar">📅 Plan</button>
    <button class="header-btn" id="btnTheme">🌙</button>
  </div>
</header>

<div class="search-bar"><input type="text" id="searchInput" placeholder="Buscar tema... (NiTi, adhesion, CBCT)" /></div>

<section class="progress-section">
  <h2>Areas principales</h2>
  <div class="progress-grid" id="progressGrid"></div>
</section>

<div class="section-divider">📚 Areas de Estudio</div>

<div class="main-grid" id="mainGrid"></div>

<section class="timeline-section">
  <h2>Ruta de aprendizaje sugerida</h2>
  <div class="timeline" id="timeline"></div>
</section>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><button class="modal-close" id="modalClose">✕</button><div id="modalContent"></div></div></div>
<div class="overlay bg-dark" id="labOverlay"><div class="panel lab-panel" id="labPanel" style="--accent:#7c3aed"><button class="panel-close" id="labClose">✕</button><div class="lab-header" id="labHeader"></div><div class="lab-body" id="labBody"></div></div></div>
<div class="overlay bg-dark" id="quizOverlay"><div class="panel quiz-panel" id="quizPanel" style="--accent:#7c3aed"><button class="panel-close" id="quizClose">✕</button><div class="quiz-header" id="quizHeader"></div><div class="quiz-body" id="quizBody"></div></div></div>
<div class="lightbox" id="lightbox"><img id="lightboxImg" /><div class="lightbox-caption" id="lightboxCap"></div></div>

function isPremium() { return API.key && API.key.length > 10; }

function promptApiKey() {
  var k = prompt("🔑 Ingresa tu Anthropic API key para activar Premium:\n(Obtenla en console.anthropic.com)");
  if (k && k.startsWith('sk-ant')) {
    API.key = k;
    localStorage.setItem('anthropic_key', k);
    alert('✅ Premium activado! Recarga la pagina para ver los cambios.');
    location.reload();
  }
}



async function askAI(messages, onChunk) {
  var system = '';
  var filtered = [];
  for (var i = 0; i < messages.length; i++) {
    if (messages[i].role === 'system') system = messages[i].content;
    else filtered.push(messages[i]);
  }
  var body = { model: API.model, max_tokens: 4096, stream: !!onChunk, messages: filtered };
  if (system) body.system = system;
  var res = await fetch(API.url, {
    method: 'POST',
    headers: { 'x-api-key': API.key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { var e = await res.text(); throw new Error('API ' + res.status + ': ' + e.substring(0,120)); }
  if (!onChunk) { var d = await res.json(); return d.content[0].text; }
  var reader = res.body.getReader(); var dec = new TextDecoder(); var buf = '';
  while (true) {
    var chunk = await reader.read(); if (chunk.done) break;
    buf += dec.decode(chunk.value, { stream: true }); var lines = buf.split('\n'); buf = lines.pop();
    for (var li = 0; li < lines.length; li++) { var line = lines[li]; if (!line.startsWith('data:')) continue; var p = line.slice(5).trim(); if (p === '[DONE]') return; try { var j = JSON.parse(p); if (j.type === 'content_block_delta' && j.delta && j.delta.text) onChunk(j.delta.text); } catch(ex) {} }
  }
}

// ══════════════════════════════════════════════
// LOCAL STORAGE HELPERS
// ══════════════════════════════════════════════
var STORE_KEYS = {
  quizHistory: 'odonto_quiz_history',
  examHistory: 'odonto_exam_history',
  flashcards: 'odonto_flashcards',
  notes: 'odonto_notes',
  theme: 'odonto_theme'
};

function storeGet(key, fallback) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function storeSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function saveQuizResult(topicName, areaId, score, total, answers) {
  var history = storeGet(STORE_KEYS.quizHistory, []);
  history.push({ topicName: topicName, areaId: areaId, score: score, total: total, date: new Date().toISOString(), answers: answers });
  storeSet(STORE_KEYS.quizHistory, history);
}

function getTopicScores(topicName) {
  var history = storeGet(STORE_KEYS.quizHistory, []);
  return history.filter(function(h) { return h.topicName === topicName; });
}

function getAreaAvgScore(areaId) {
  var history = storeGet(STORE_KEYS.quizHistory, []);
  var areaResults = history.filter(function(h) { return h.areaId === areaId; });
  if (areaResults.length === 0) return null;
  var topicBest = {};
  areaResults.forEach(function(r) {
    var pct = Math.round((r.score / r.total) * 100);
    if (!topicBest[r.topicName] || pct > topicBest[r.topicName]) topicBest[r.topicName] = pct;
  });
  var vals = Object.values(topicBest);
  return Math.round(vals.reduce(function(a,b){return a+b;},0) / vals.length);
}

function getTopicLastScore(topicName) {
  var scores = getTopicScores(topicName);
  if (scores.length === 0) return null;
  var last = scores[scores.length - 1];
  return { pct: Math.round((last.score / last.total) * 100), date: last.date };
}

function saveNote(topicKey, text) { var notes = storeGet(STORE_KEYS.notes, {}); notes[topicKey] = text; storeSet(STORE_KEYS.notes, notes); }
function getNote(topicKey) { return (storeGet(STORE_KEYS.notes, {}))[topicKey] || ''; }

function getFlashcardState(topicKey) { var all = storeGet(STORE_KEYS.flashcards, {}); return all[topicKey] || null; }
function setFlashcardState(topicKey, state) { var all = storeGet(STORE_KEYS.flashcards, {}); all[topicKey] = state; storeSet(STORE_KEYS.flashcards, all); }

function applyTheme(theme) {
  if (theme === 'light') { document.documentElement.classList.add('light'); document.getElementById('btnTheme').textContent = '☀️'; }
  else { document.documentElement.classList.remove('light'); document.getElementById('btnTheme').textContent = '🌙'; }
  storeSet(STORE_KEYS.theme, theme);
}
document.getElementById('btnTheme').onclick = function() {
  var current = storeGet(STORE_KEYS.theme, 'dark');
  applyTheme(current === 'dark' ? 'light' : 'dark');
};

async function fetchPMCImages(query) {
  try {
    var searchUrl = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pmc&term=' + encodeURIComponent(query + ' dental oral') + '&retmax=5&retmode=json';
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 5000);
    var searchRes = await fetch(searchUrl, { signal: controller.signal });
    clearTimeout(timeout);
    var searchData = await searchRes.json();
    var ids = (searchData && searchData.esearchresult && searchData.esearchresult.idlist) ? searchData.esearchresult.idlist : [];
    if (ids.length === 0) return [];
    var summaryUrl = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pmc&id=' + ids.join(',') + '&retmode=json';
    var controller2 = new AbortController();
    var timeout2 = setTimeout(function() { controller2.abort(); }, 5000);
    var summaryRes = await fetch(summaryUrl, { signal: controller2.signal });
    clearTimeout(timeout2);
    var summaryData = await summaryRes.json();
    var results = [];
    for (var k = 0; k < ids.length; k++) {
      var article = summaryData && summaryData.result ? summaryData.result[ids[k]] : null;
      if (article) results.push({ title: article.title || 'PMC Article', authors: article.sortfirstauthor || '', journal: article.fulljournalname || article.source || '', year: (article.pubdate || '').substring(0, 4), pmcid: 'PMC' + ids[k], url: 'https://www.ncbi.nlm.nih.gov/pmc/articles/PMC' + ids[k] + '/' });
    }
    return results;
  } catch(e) { return []; }
}

  if (!isPremium() && STATIC_QUESTIONS[area.id] && STATIC_QUESTIONS[area.id].length >= 10) {
    var pool = STATIC_QUESTIONS[area.id].slice();
    // Shuffle and pick 10
    for (var si = pool.length - 1; si > 0; si--) { var sj = Math.floor(Math.random() * (si + 1)); var tmp = pool[si]; pool[si] = pool[sj]; pool[sj] = tmp; }
    var questions = pool.slice(0, 10);
    quizState = { questions: questions, answers: new Array(10).fill(null), current: 0, color: color, topic: topic, area: area };
    renderQuizQ();
    return;
  }
  if (!isPremium()) { showPremiumGate(document.getElementById('quizBody'), 'Quiz con IA ilimitado'); return; }
  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var questions = JSON.parse(jsonMatch[0]); if (questions.length < 10) throw new Error('<10 preguntas');
    quizState = { questions: questions.slice(0,10), answers: new Array(10).fill(null), current: 0, color: color, topic: topic, area: area };

}
function renderQuizQ() {
  var s = quizState, q = s.questions[s.current], n = s.current + 1, answered = s.answers[s.current] !== null;
  document.getElementById('quizProgressFill').style.width = ((n/10)*100) + '%';
  document.getElementById('quizProgressText').textContent = n + ' / 10';
  var letters = ['A','B','C','D'];
  var optHtml = '';
  q.options.forEach(function(opt, i) {
    var cls = 'quiz-opt';
    if (answered) { cls += ' locked'; if (i===q.correct) cls += ' correct'; else if (i===s.answers[s.current]&&i!==q.correct) cls += ' wrong'; }
    optHtml += '<div class="' + cls + '" data-oi="' + i + '"><div class="opt-letter">' + letters[i] + '</div><div class="opt-text">' + md(opt.replace(/^[A-D]\)\s*/,'')) + '</div></div>';
  });
  var isLast = s.current === 9;
  document.getElementById('quizBody').innerHTML =
    '<div class="quiz-question"><div class="quiz-q-number" style="color:' + s.color + '">Pregunta ' + n + ' de 10</div><div class="quiz-q-text">' + md(q.q) + '</div><div class="quiz-options">' + optHtml + '</div><div class="quiz-explanation ' + (answered?'visible':'') + '" style="--accent:' + s.color + '">' + (answered?md('**Explicacion:** '+q.explanation):'') + '</div></div>' +
    '<div class="quiz-nav"><button class="quiz-nav-btn sec" ' + (s.current===0?'disabled':'') + ' id="qPrev">← Anterior</button><div>' + (!answered?'<button class="quiz-nav-btn primary" style="background:' + s.color + '" id="qCheck" disabled>Verificar</button>':'') + (answered?(isLast?'<button class="quiz-nav-btn primary" style="background:' + s.color + '" id="qFinish">📊 Resultados</button>':'<button class="quiz-nav-btn primary" style="background:' + s.color + '" id="qNext">Siguiente →</button>'):'') + '</div></div>';
  if (!answered) {
    var sel = null;
    document.querySelectorAll('.quiz-opt').forEach(function(o) {
      o.onclick = function() { document.querySelectorAll('.quiz-opt').forEach(function(x){x.classList.remove('selected');}); o.classList.add('selected'); sel=+o.dataset.oi; var cb=document.getElementById('qCheck'); if(cb)cb.disabled=false; };
    });
    var cb=document.getElementById('qCheck'); if(cb) cb.onclick=function(){if(sel!==null){s.answers[s.current]=sel;renderQuizQ();}};
  }
  var pb=document.getElementById('qPrev'); if(pb) pb.onclick=function(){if(s.current>0){s.current--;renderQuizQ();}};
  var nb=document.getElementById('qNext'); if(nb) nb.onclick=function(){if(s.current<9){s.current++;renderQuizQ();}};
  var fb=document.getElementById('qFinish'); if(fb) fb.onclick=renderQuizResults;
}
function renderQuizResults() {
  var s = quizState; var correct = 0;
  var bd = s.questions.map(function(q,i) { var ok = s.answers[i]===q.correct; if(ok)correct++; var L=['A','B','C','D']; return {q:q.q,isCorrect:ok,yours:L[s.answers[i]],right:L[q.correct],explanation:q.explanation}; });
  var pct = Math.round((correct/10)*100);
  // Save to localStorage

  renderProgress();
  var msg,mc; if(pct>=90){msg='🏆 Excelente!';mc='#22c55e';}else if(pct>=70){msg='👍 Buen trabajo';mc='#00d4ff';}else if(pct>=50){msg='📚 A repasar';mc='#f59e0b';}else{msg='⚠️ Necesitas estudiar mas';mc='#ef4444';}

    wrongHtml += '</div>';
  }
  var rightHtml = '';

    rightHtml = '<div class="results-breakdown" style="margin-top:20px"><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:#22c55e;margin-bottom:10px">✅ Correctas</div>';
    right.forEach(function(b) { rightHtml += '<div class="rb-item"><div class="rb-icon correct">✓</div><div class="rb-text">' + md(b.q) + '</div></div>'; });
    rightHtml += '</div>';
  }
  document.getElementById('quizBody').innerHTML =
    '<div class="quiz-results"><div class="results-label">Resultado en</div><div class="lab-title">' + s.topic.name + '</div><div class="results-score" style="color:' + (pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444') + '">' + pct + '%</div><div class="results-label">' + correct + '/10 correctas</div><div class="results-msg" style="color:' + mc + '">' + msg + '</div></div>' +

    (answered ? '<div style="text-align:center;margin-top:16px"><button class="quiz-nav-btn primary" style="background:' + s.color + '" id="clinicalNext">' + (s.current < c.steps.length - 1 ? 'Siguiente paso →' : '📊 Ver resultados') + '</button></div>' : '');

      };
    });
  }
  var nb = document.getElementById('clinicalNext');
  if (nb) nb.onclick = function() { s.current++; renderClinicalStep(); };
}
function renderClinicalResults() {

}

// 4. FLASHCARDS WITH SPACED REPETITION
// ══════════════════════════════════════════════
var flashState = null;
async function openFlashcards(topic, area) {
  if (!isPremium() && STATIC_FLASHCARDS[area.id] && STATIC_FLASHCARDS[area.id].length > 0) {
    openFullModal('flashcardModal');
    var cards = STATIC_FLASHCARDS[area.id].map(function(c,i){ return {front:c.front,back:c.back,box:0,nextReview:0,id:i}; });
    window._flashState = {cards:cards,current:0,topic:topic,area:area,color:area.color};
    renderFlashcard();
    return;
  }
  if (!isPremium()) { openFullModal('flashcardModal'); showPremiumGate(document.getElementById('flashcardModalContent'), 'Flashcards con IA'); return; }
  openFullModal('flashcardModal');
  var color = area.color;
  var cont = document.getElementById('flashcardModalContent');
  var topicKey = 'fc_' + topic.name.replace(/\s/g, '_');
  var saved = getFlashcardState(topicKey);

  if (saved && saved.cards && saved.cards.length > 0) {
    flashState = { cards: saved.cards, boxes: saved.boxes || saved.cards.map(function() { return 1; }), current: 0, color: color, topic: topic, topicKey: topicKey, flipped: false };
    sortFlashcards();
    renderFlashcard();
    return;
  }

  cont.innerHTML = '<div style="text-align:center;padding:40px"><div class="lab-spinner" style="border-top-color:' + color + ';width:40px;height:40px;border:3px solid var(--card-border);border-top-color:' + color + ';border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div><div style="color:var(--text5)">Generando flashcards sobre ' + topic.name + '...</div></div>';

  var prompt = 'Genera exactamente 10 flashcards sobre "' + topic.name + '" en odontologia. Responde UNICAMENTE en JSON valido:\n[{"front":"Pregunta o concepto","back":"Respuesta detallada"}]\nEn espanol con terminologia tecnica. Variedad: definiciones, mecanismos, protocolos, datos clinicos.';
  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var cards = JSON.parse(jsonMatch[0]).slice(0, 10);
    var boxes = cards.map(function() { return 1; });
    flashState = { cards: cards, boxes: boxes, current: 0, color: color, topic: topic, topicKey: topicKey, flipped: false };
    setFlashcardState(topicKey, { cards: cards, boxes: boxes });
    renderFlashcard();
  } catch (err) {
    cont.innerHTML = '<div style="color:#f87171;padding:20px">Error: ' + err.message + '</div>';
  }
}
function sortFlashcards() {
  // Leitner: lower boxes come first
  var indices = flashState.cards.map(function(_, i) { return i; });
  indices.sort(function(a, b) { return flashState.boxes[a] - flashState.boxes[b]; });
  var newCards = indices.map(function(i) { return flashState.cards[i]; });
  var newBoxes = indices.map(function(i) { return flashState.boxes[i]; });
  flashState.cards = newCards;
  flashState.boxes = newBoxes;
}
function renderFlashcard() {
  var s = flashState;
  var cont = document.getElementById('flashcardModalContent');
  var mastered = s.boxes.filter(function(b) { return b >= 4; }).length;
  var remaining = s.cards.length - mastered;
  var card = s.cards[s.current];
  cont.innerHTML =
    '<div style="text-align:center;margin-bottom:16px"><div class="quiz-badge" style="background:' + s.color + '22;color:' + s.color + '">🃏 Flashcards</div><div class="lab-title">' + s.topic.name + '</div></div>' +
    '<div class="flashcard-progress">Tarjeta ' + (s.current+1) + ' de ' + s.cards.length + ' · ✅ Dominadas: ' + mastered + ' · 📚 Pendientes: ' + remaining + ' · Box: ' + s.boxes[s.current] + '</div>' +
    '<div class="flashcard-container"><div class="flashcard' + (s.flipped ? ' flipped' : '') + '" id="flashcardEl">' +
      '<div class="flashcard-face flashcard-front" style="border-color:' + s.color + '44"><h3 style="color:' + s.color + '">Pregunta</h3><p>' + md(card.front) + '</p><div style="margin-top:16px;font-size:.72rem;color:var(--text6)">Click para voltear</div></div>' +
      '<div class="flashcard-face flashcard-back" style="border-color:' + s.color + '44"><h3 style="color:' + s.color + '">Respuesta</h3><p>' + md(card.back) + '</p></div>' +
    '</div></div>' +
    (s.flipped ? '<div class="flashcard-rating"><button style="background:#22c55e" onclick="rateFlashcard(\'easy\')">😎 Facil</button><button style="background:#f59e0b" onclick="rateFlashcard(\'medium\')">🤔 Medio</button><button style="background:#ef4444" onclick="rateFlashcard(\'hard\')">😰 Dificil</button></div>' : '') +
    '<div style="display:flex;justify-content:center;gap:12px;margin-top:20px"><button class="quiz-nav-btn sec" onclick="closeFullModal(\'flashcardModal\')">✕ Cerrar</button><button class="quiz-nav-btn sec" onclick="resetFlashcards()">🔄 Regenerar</button></div>';
  var fc = document.getElementById('flashcardEl');
  if (fc) fc.onclick = function() { s.flipped = !s.flipped; renderFlashcard(); };
}
function rateFlashcard(rating) {
  var s = flashState;
  if (rating === 'easy') s.boxes[s.current] = Math.min(s.boxes[s.current] + 2, 5);
  else if (rating === 'medium') s.boxes[s.current] = Math.min(s.boxes[s.current] + 1, 5);
  else s.boxes[s.current] = Math.max(s.boxes[s.current] - 1, 1);
  setFlashcardState(s.topicKey, { cards: s.cards, boxes: s.boxes });
  s.flipped = false;
  s.current = (s.current + 1) % s.cards.length;
  renderFlashcard();
}
function resetFlashcards() {
  if (flashState) {
    setFlashcardState(flashState.topicKey, null);
    openFlashcards(flashState.topic, { color: flashState.color });
  }
}

// 5. MIXED EXAM MODE
// ══════════════════════════════════════════════
var examState = null;
var examTimerInterval = null;
document.getElementById('btnExam').onclick = function() { startExam(); };

async function startExam() {
  if (!isPremium()) { showPremiumGate(document.getElementById('examModalContent'), 'Examen Mixto de 30 preguntas'); return; }
  openFullModal('examModal');
  var cont = document.getElementById('examModalContent');
  cont.innerHTML = '<div style="text-align:center;padding:40px"><div class="lab-spinner" style="border-top-color:#7c3aed;width:40px;height:40px;border:3px solid var(--card-border);border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div><div style="color:var(--text5)">Generando examen mixto de 30 preguntas...</div></div>';

  var allTopics = [];
  DATA.forEach(function(area) {
    area.topics.forEach(function(t) {
      allTopics.push({ name: t.name, areaId: area.id, areaTitle: area.title, color: area.color });
    });
  });

  // Pick 5 random topics to generate 6 questions each = 30
  var shuffled = allTopics.sort(function() { return Math.random() - 0.5; }).slice(0, 5);
  var topicNames = shuffled.map(function(t) { return t.name; }).join(', ');

  var prompt = 'Genera exactamente 30 preguntas de opcion multiple para un examen mixto de odontologia. Los temas son: ' + topicNames + '. 6 preguntas por tema. Nivel avanzado.\nResponde UNICAMENTE en JSON valido:\n[{"q":"Pregunta","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0,"explanation":"Explicacion","topic":"Nombre del tema exacto"}]\nEn espanol con terminologia tecnica en *ingles*.';

  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var questions = JSON.parse(jsonMatch[0]).slice(0, 30);
    examState = {
      questions: questions,
      answers: new Array(questions.length).fill(null),
      current: 0,
      topicMap: {},
      timeLeft: 45 * 60
    };
    shuffled.forEach(function(t) { examState.topicMap[t.name] = t; });
    startExamTimer();
    renderExamQ();
  } catch (err) {
    cont.innerHTML = '<div style="color:#f87171;padding:20px">Error: ' + err.message + '</div>';
  }
}
function startExamTimer() {
  if (examTimerInterval) clearInterval(examTimerInterval);
  examTimerInterval = setInterval(function() {
    examState.timeLeft--;
    var timerEl = document.getElementById('examTimer');
    if (timerEl) {
      var min = Math.floor(examState.timeLeft / 60);
      var sec = examState.timeLeft % 60;
      timerEl.textContent = (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;
      timerEl.className = 'exam-timer' + (examState.timeLeft < 300 ? ' danger' : examState.timeLeft < 600 ? ' warning' : '');
    }
    if (examState.timeLeft <= 0) {
      clearInterval(examTimerInterval);
      renderExamResults();
    }
  }, 1000);
}
function renderExamQ() {
  var s = examState;
  var q = s.questions[s.current];
  var n = s.current + 1;
  var total = s.questions.length;
  var answered = s.answers[s.current] !== null;
  var min = Math.floor(s.timeLeft / 60);
  var sec = s.timeLeft % 60;
  var letters = ['A','B','C','D'];
  var optHtml = '';
  q.options.forEach(function(opt, i) {
    var cls = 'quiz-opt';
    if (answered) { cls += ' locked'; if (i===q.correct) cls += ' correct'; else if (i===s.answers[s.current] && i!==q.correct) cls += ' wrong'; }
    optHtml += '<div class="' + cls + '" data-ei="' + i + '"><div class="opt-letter">' + letters[i] + '</div><div class="opt-text">' + md(opt.replace(/^[A-D]\)\s*/,'')) + '</div></div>';
  });
  var cont = document.getElementById('examModalContent');
  cont.innerHTML =
    '<div style="text-align:center;margin-bottom:16px"><div class="quiz-badge" style="background:#7c3aed22;color:#7c3aed">📝 Examen Mixto</div></div>' +
    '<div class="exam-timer" id="examTimer">' + (min<10?'0':'') + min + ':' + (sec<10?'0':'') + sec + '</div>' +
    '<div class="quiz-progress-bar"><div style="height:100%;border-radius:3px;background:#7c3aed;width:' + ((n/total)*100) + '%;transition:width .4s"></div></div>' +
    '<div style="font-size:.72rem;color:var(--text6);text-align:right;margin:6px 0">' + n + ' / ' + total + '</div>' +
    '<div style="font-size:.72rem;color:var(--text5);margin-bottom:8px">Tema: ' + (q.topic || 'Mixto') + '</div>' +
    '<div class="quiz-q-text">' + md(q.q) + '</div>' +
    '<div class="quiz-options">' + optHtml + '</div>' +
    '<div class="quiz-explanation ' + (answered?'visible':'') + '" style="--accent:#7c3aed">' + (answered?md('**Explicacion:** '+q.explanation):'') + '</div>' +
    '<div class="quiz-nav">' +
      '<button class="quiz-nav-btn sec" ' + (s.current===0?'disabled':'') + ' id="ePrev">← Anterior</button>' +
      '<div>' +
        (!answered ? '<button class="quiz-nav-btn primary" style="background:#7c3aed" id="eCheck" disabled>Verificar</button>' : '') +
        (answered ? (s.current < total - 1 ? '<button class="quiz-nav-btn primary" style="background:#7c3aed" id="eNext">Siguiente →</button>' : '<button class="quiz-nav-btn primary" style="background:#7c3aed" id="eFinish">📊 Resultados</button>') : '') +
      '</div>' +
    '</div>';
  if (!answered) {
    var sel = null;
    document.querySelectorAll('[data-ei]').forEach(function(o) {
      o.onclick = function() { document.querySelectorAll('[data-ei]').forEach(function(x){x.classList.remove('selected');}); o.classList.add('selected'); sel=+o.dataset.ei; var cb=document.getElementById('eCheck'); if(cb) cb.disabled=false; };
    });
    var cb = document.getElementById('eCheck'); if(cb) cb.onclick = function() { if(sel!==null) { s.answers[s.current]=sel; renderExamQ(); } };
  }
  var pb = document.getElementById('ePrev'); if(pb) pb.onclick = function() { if(s.current>0){s.current--;renderExamQ();} };
  var nb = document.getElementById('eNext'); if(nb) nb.onclick = function() { s.current++; renderExamQ(); };
  var fb = document.getElementById('eFinish'); if(fb) fb.onclick = function() { clearInterval(examTimerInterval); renderExamResults(); };
}
function renderExamResults() {
  if (examTimerInterval) clearInterval(examTimerInterval);
  var s = examState;
  var correct = 0;
  var byTopic = {};
  s.questions.forEach(function(q, i) {
    var ok = s.answers[i] === q.correct;
    if (ok) correct++;
    var t = q.topic || 'Otro';
    if (!byTopic[t]) byTopic[t] = { correct: 0, total: 0 };
    byTopic[t].total++;
    if (ok) byTopic[t].correct++;
  });
  var pct = Math.round((correct / s.questions.length) * 100);
  // Save exam to history
  var examHistory = storeGet(STORE_KEYS.examHistory, []);
  examHistory.push({ score: correct, total: s.questions.length, pct: pct, date: new Date().toISOString(), byTopic: byTopic });
  storeSet(STORE_KEYS.examHistory, examHistory);
  var breakdownHtml = '';
  Object.keys(byTopic).forEach(function(topic) {
    var d = byTopic[topic];
    var tpct = Math.round((d.correct / d.total) * 100);
    var clr = tpct >= 80 ? '#22c55e' : tpct >= 50 ? '#f59e0b' : '#ef4444';
    breakdownHtml += '<div class="rb-item"><div class="rb-icon" style="background:' + clr + '22;color:' + clr + '">' + tpct + '%</div><div class="rb-text">' + topic + ' (' + d.correct + '/' + d.total + ')</div></div>';
  });
  var cont = document.getElementById('examModalContent');
  cont.innerHTML =
    '<div class="quiz-results"><div class="quiz-badge" style="background:#7c3aed22;color:#7c3aed">📝 Examen Mixto — Resultados</div><div class="results-score" style="color:' + (pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444') + '">' + pct + '%</div><div class="results-label">' + correct + '/' + s.questions.length + ' correctas</div></div>' +
    '<div class="results-breakdown"><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">Desglose por area</div>' + breakdownHtml + '</div>' +
    '<div class="results-actions"><button class="quiz-nav-btn primary" style="background:#7c3aed" onclick="startExam()">🔄 Nuevo examen</button><button class="quiz-nav-btn sec" onclick="clearInterval(examTimerInterval);closeFullModal(\'examModal\')">✕ Cerrar</button></div>';
}

document.getElementById('btnProgress').onclick = function() { renderProgressDashboard(); };

function renderProgressDashboard() {
  openFullModal('progressModal');
  var cont = document.getElementById('progressModalContent');
  var history = storeGet(STORE_KEYS.quizHistory, []);
  var examHistory = storeGet(STORE_KEYS.examHistory, []);

  // Calculate per-topic best scores
  var topicScores = {};
  history.forEach(function(h) {
    var pct = Math.round((h.score / h.total) * 100);
    if (!topicScores[h.topicName] || pct > topicScores[h.topicName].pct) {
      topicScores[h.topicName] = { pct: pct, date: h.date, areaId: h.areaId };
    }
  });

  // Overall score
  var allPcts = Object.values(topicScores).map(function(v) { return v.pct; });
  var overallPct = allPcts.length > 0 ? Math.round(allPcts.reduce(function(a,b){return a+b;},0) / allPcts.length) : 0;

  // Build topic list
  var topicListHtml = '';
  var weakTopics = [];
  DATA.forEach(function(area) {
    topicListHtml += '<div style="margin-top:16px;font-size:.82rem;font-weight:800;color:' + area.color + '">' + area.icon + ' ' + area.title + '</div>';
    area.topics.forEach(function(t) {
      var sc = topicScores[t.name];
      var emoji = '⚪';
      var pctText = 'No intentado';
      var pctVal = -1;
      if (sc) {
        pctVal = sc.pct;
        if (sc.pct > 80) emoji = '🟢';
        else if (sc.pct >= 50) emoji = '🟡';
        else emoji = '🔴';
        pctText = sc.pct + '% (' + new Date(sc.date).toLocaleDateString('es') + ')';
      }
      weakTopics.push({ name: t.name, pct: pctVal, area: area.title });
      topicListHtml += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.84rem"><span>' + emoji + '</span><span style="flex:1;color:var(--text2)">' + t.name + '</span><span style="color:var(--text5);font-size:.78rem">' + pctText + '</span></div>';
    });
  });

  // Suggested study order (weakest first)
  weakTopics.sort(function(a, b) { return a.pct - b.pct; });
  var suggestedHtml = '';
  weakTopics.slice(0, 10).forEach(function(t, i) {
    suggestedHtml += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.82rem"><span style="color:var(--text5);font-weight:800">' + (i+1) + '.</span><span style="flex:1;color:var(--text2)">' + t.name + '</span><span style="color:var(--text6);font-size:.76rem">' + (t.pct >= 0 ? t.pct + '%' : 'Pendiente') + '</span></div>';
  });

  // Quiz history timeline
  var timelineHtml = '';
  var recent = history.slice(-10).reverse();
  recent.forEach(function(h) {
    var d = new Date(h.date);
    var p = Math.round((h.score/h.total)*100);
    var clr = p >= 80 ? '#22c55e' : p >= 50 ? '#f59e0b' : '#ef4444';
    timelineHtml += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.82rem"><span style="color:' + clr + ';font-weight:800;min-width:40px">' + p + '%</span><span style="flex:1;color:var(--text2)">' + h.topicName + '</span><span style="color:var(--text6);font-size:.72rem">' + d.toLocaleDateString('es') + ' ' + d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) + '</span></div>';
  });

  cont.innerHTML =
    '<div style="text-align:center;margin-bottom:24px"><div class="quiz-badge" style="background:#7c3aed22;color:#7c3aed">📊 Mi Progreso</div><div class="results-score" style="color:' + (overallPct>=70?'#22c55e':overallPct>=50?'#f59e0b':'#ef4444') + '">' + overallPct + '%</div><div class="results-label">Puntuacion general · ' + allPcts.length + ' temas evaluados de ' + weakTopics.length + '</div></div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px">' +
      '<div><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">Mapa de temas</div>' + topicListHtml + '</div>' +
      '<div><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">📌 Orden de estudio sugerido (debilidades primero)</div>' + suggestedHtml +
        (timelineHtml ? '<div style="margin-top:24px;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">🕐 Historial reciente</div>' + timelineHtml : '') +
        (examHistory.length > 0 ? '<div style="margin-top:24px;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">📝 Examenes</div>' + examHistory.slice(-5).reverse().map(function(e) { return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.82rem"><span style="color:' + (e.pct>=70?'#22c55e':e.pct>=50?'#f59e0b':'#ef4444') + ';font-weight:800">' + e.pct + '%</span><span style="color:var(--text5)">' + new Date(e.date).toLocaleDateString('es') + '</span></div>'; }).join('') : '') +
      '</div>' +
    '</div>';
}

    '<div style="text-align:center;margin:30px 0">' +
      '<label style="font-size:.88rem;color:var(--text3)">¿Cuando es tu examen?</label><br>' +
      '<input type="date" id="examDateInput" style="margin-top:10px;padding:10px 18px;border-radius:10px;border:1px solid var(--line);background:var(--input-bg);color:var(--text);font-size:1rem;outline:none">' +
      '<br><button class="quiz-nav-btn primary" style="background:#f59e0b;margin-top:16px" id="genCalendarBtn">✦ Generar plan con IA</button>' +
    '</div>';
  document.getElementById('genCalendarBtn').onclick = generateStudyCalendar;
}

async function generateStudyCalendar() {
  var dateInput = document.getElementById('examDateInput');
  if (!dateInput.value) { alert('Selecciona una fecha de examen'); return; }
  var examDate = new Date(dateInput.value);
  var today = new Date();
  var daysUntil = Math.max(1, Math.ceil((examDate - today) / (1000*60*60*24)));
  var weeks = Math.max(1, Math.ceil(daysUntil / 7));

  var cont = document.getElementById('calendarModalContent');
  cont.innerHTML = '<div style="text-align:center;padding:40px"><div class="lab-spinner" style="border-top-color:#f59e0b;width:40px;height:40px;border:3px solid var(--card-border);border-top-color:#f59e0b;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div><div style="color:var(--text5)">Generando plan de estudio para ' + weeks + ' semanas...</div></div>';

  // Build weakness info
  var history = storeGet(STORE_KEYS.quizHistory, []);
  var topicScores = {};
  history.forEach(function(h) {
    var pct = Math.round((h.score / h.total) * 100);
    if (!topicScores[h.topicName] || pct > topicScores[h.topicName]) topicScores[h.topicName] = pct;
  });
  var weaknessInfo = '';
  DATA.forEach(function(area) {
    area.topics.forEach(function(t) {
      var sc = topicScores[t.name];
      weaknessInfo += t.name + ': ' + (sc !== undefined ? sc + '%' : 'no evaluado') + '\n';
    });
  });

  var prompt = 'Genera un plan de estudio semanal de odontologia. Faltan ' + daysUntil + ' dias (' + weeks + ' semanas) para el examen. Datos de debilidades del estudiante:\n' + weaknessInfo + '\nResponde UNICAMENTE en JSON valido:\n[{"week":1,"days":[{"day":"Lunes","topics":["Tema 1","Tema 2"],"focus":"Descripcion breve del enfoque"},{"day":"Martes","topics":["Tema"],"focus":"..."}]}]\nMaximo ' + Math.min(weeks, 6) + ' semanas. Prioriza temas debiles. En espanol. Incluye dias de repaso.';

  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var plan = JSON.parse(jsonMatch[0]);
    renderCalendar(plan, examDate);
  } catch (err) {
    cont.innerHTML = '<div style="color:#f87171;padding:20px">Error: ' + err.message + '</div>';
  }
}

function renderCalendar(plan, examDate) {
  var cont = document.getElementById('calendarModalContent');
  var html = '<div style="text-align:center;margin-bottom:20px"><div class="quiz-badge" style="background:#f59e0b22;color:#f59e0b">📅 Plan de Estudio</div><div class="lab-title">Tu calendario personalizado</div><div style="color:var(--text5);font-size:.82rem;margin-top:6px">Examen: ' + examDate.toLocaleDateString('es', {weekday:'long',year:'numeric',month:'long',day:'numeric'}) + '</div></div>';

  plan.forEach(function(week) {
    html += '<div style="margin-top:20px"><div style="font-size:.82rem;font-weight:800;color:var(--text4);margin-bottom:10px">Semana ' + week.week + '</div><div class="calendar-grid">';
    (week.days || []).forEach(function(day) {
      var topicsHtml = (day.topics || []).map(function(t) {
        return '<div class="day-topic" style="background:var(--line)">' + t + '</div>';
      }).join('');
      html += '<div class="calendar-day"><div class="day-label">' + day.day + '</div>' + topicsHtml + '<div style="font-size:.64rem;color:var(--text6);margin-top:4px">' + (day.focus || '') + '</div></div>';
    });
    html += '</div></div>';
  });

  html += '<div style="text-align:center;margin-top:20px"><button class="quiz-nav-btn sec" onclick="openCalendarModal()">🔄 Regenerar</button></div>';
  cont.innerHTML = html;
}

// ══════════════════════════════════════════════
// AREA MODAL
// ══════════════════════════════════════════════
function openAreaModal(item) {
  document.getElementById('modalContent').innerHTML =
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px"><span style="font-size:2rem">' + item.icon + '</span><div><h2 style="color:' + item.color + ';font-size:1.3rem">' + item.title + '</h2><div style="color:var(--text5);font-size:.8rem">' + item.subtitle + '</div></div></div>' +
    '<p style="color:var(--text4);font-size:.88rem;line-height:1.6;margin-bottom:20px">' + item.description + '</p>' +
    item.topics.map(function(t) { return '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.85rem"><span style="color:' + item.color + '">▸</span><div><strong>' + t.name + '</strong><div style="color:var(--text6);font-size:.78rem;margin-top:2px">' + t.desc + '</div></div></div>'; }).join('');
  document.getElementById('modalOverlay').classList.add('active');
}

// ══════════════════════════════════════════════
// TIMELINE
// ══════════════════════════════════════════════
function renderTimeline() {
  var section = document.querySelector('.timeline-section');
  var tl = document.getElementById('timeline');
  tl.style.display = 'none';
  section.querySelector('h2').innerHTML = '📍 Ruta de Aprendizaje <span style="font-size:var(--fs-xs);color:var(--text5);cursor:pointer;font-weight:500" id="timelineToggle">(click para expandir)</span>';
  var TIMELINE_DATA = TIMELINE;
  TIMELINE_DATA.forEach(function(item, i) {
    var el = document.createElement('div'); el.className = 'timeline-item';
    el.innerHTML = '<div class="tl-label" style="color:' + item.color + '">' + item.label + '</div><div class="tl-title">' + item.title + '</div><div class="tl-desc">' + item.desc + '</div>';
    tl.appendChild(el);
    var s = document.createElement('style');
    s.textContent = '.timeline-item:nth-child(' + (i+1) + ')::before{content:\'\';width:10px;height:10px;background:' + item.color + ';border-color:' + item.color + ';border-radius:50%;position:absolute;left:-26px;top:6px;border:2px solid}';
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════
document.getElementById('modalClose').onclick = function() { document.getElementById('modalOverlay').classList.remove('active'); };
document.getElementById('modalOverlay').onclick = function(e) { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('labClose').onclick = function() { document.getElementById('labOverlay').classList.remove('active'); };
document.getElementById('labOverlay').onclick = function(e) { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('quizClose').onclick = function() { document.getElementById('quizOverlay').classList.remove('active'); };
document.getElementById('quizOverlay').onclick = function(e) { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('searchInput').oninput = function(e) { renderGrid(e.target.value.toLowerCase().trim()); };

// Close full modals on background click
document.querySelectorAll('.full-modal').forEach(function(modal) {
  modal.onclick = function(e) {
    if (e.target === modal) {
      modal.classList.remove('active');
      if (examTimerInterval && modal.id === 'examModal') clearInterval(examTimerInterval);
    }
  };
});

document.onkeydown = function(e) {
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay,.modal-overlay,.lightbox,.full-modal').forEach(function(o){o.classList.remove('active');});
    if (examTimerInterval) clearInterval(examTimerInterval);
  }
  if(e.key==='/'&&['INPUT','TEXTAREA'].indexOf(document.activeElement.tagName)===-1){e.preventDefault();document.getElementById('searchInput').focus();}
};

renderProgress(); renderGrid(); renderTimeline();
var tlToggle = document.getElementById('timelineToggle');
if(tlToggle) tlToggle.onclick = function() { var t=document.getElementById('timeline'); t.style.display = t.style.display==='none'?'block':'none'; };

</script>
