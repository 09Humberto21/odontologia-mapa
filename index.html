<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Estudio — Odontología</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;overflow-x:hidden}

header{text-align:center;padding:50px 20px 30px}
header::after{content:'';display:block;width:120px;height:3px;background:linear-gradient(90deg,#00d4ff,#7c3aed);margin:16px auto 0;border-radius:2px}
header h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#00d4ff 0%,#7c3aed 50%,#f59e0b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
header p{color:#888;font-size:.95rem;margin-top:8px;font-weight:300}
.search-bar{display:flex;justify-content:center;margin:20px auto 40px;padding:0 20px}
.search-bar input{width:100%;max-width:500px;padding:12px 20px;border-radius:50px;border:1px solid #333;background:#111;color:#fff;font-size:.95rem;outline:none;transition:border .3s}
.search-bar input:focus{border-color:#7c3aed}
.search-bar input::placeholder{color:#555}
.progress-section{max-width:1200px;margin:0 auto 50px;padding:0 20px}
.progress-section h2{font-size:1.1rem;color:#888;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;text-align:center}
.progress-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.progress-card{background:#111;border:1px solid #222;border-radius:16px;padding:20px;text-align:center;cursor:pointer;transition:all .3s}
.progress-card:hover{transform:translateY(-4px);border-color:#444}
.progress-card .pct{font-size:2rem;font-weight:900;display:block}
.progress-card .label{font-size:.8rem;color:#666;margin-top:4px}
.progress-card .bar{height:4px;background:#222;border-radius:2px;margin-top:12px;overflow:hidden}
.progress-card .bar-fill{height:100%;border-radius:2px;transition:width 1.5s ease}
.main-grid{max-width:1400px;margin:0 auto;padding:0 20px 80px;display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:24px}
.card{background:#111218;border:1px solid #1e1e2e;border-radius:20px;overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1)}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.5);border-color:#333}
.card-header{padding:24px 24px 16px;display:flex;align-items:center;gap:16px;position:relative;cursor:pointer}
.card-header::after{content:'';position:absolute;bottom:0;left:24px;right:24px;height:1px;background:#1e1e2e}
.icon-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.card-title{font-size:1.1rem;font-weight:700}
.card-subtitle{font-size:.78rem;color:#666;margin-top:2px}
.card-badge{margin-left:auto;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.topics{padding:16px 24px 8px}
.topic-item{padding:12px 0;border-bottom:1px solid #1a1a2e}
.topic-item:last-child{border-bottom:none}
.topic-row{display:flex;align-items:flex-start;gap:12px}
.topic-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.topic-text{flex:1}
.topic-name{font-size:.88rem;font-weight:600;color:#e0e0e0}
.topic-desc{font-size:.76rem;color:#555;margin-top:2px;line-height:1.4}
.topic-actions{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.tag{font-size:.68rem;padding:2px 8px;border-radius:10px;background:#1a1a2e;color:#888;white-space:nowrap}
.tag-alta{background:rgba(239,68,68,.15)!important;color:#ef4444!important}
.tag-media{background:rgba(245,158,11,.15)!important;color:#f59e0b!important}
.tag-base{background:rgba(34,197,94,.15)!important;color:#22c55e!important}
.action-btn{font-size:.72rem;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:5px;transition:all .2s;color:#fff}
.action-btn:hover{transform:scale(1.04);opacity:.9}
.action-btn.outline{background:transparent!important;border:1px solid}

/* ═══ CONSOLA IA ═══ */
.ia-console{margin:10px 0 4px;display:none;animation:fadeIn .25s ease}
.ia-console.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ia-input-row{display:flex;gap:8px;align-items:flex-end}
.ia-input-row textarea{flex:1;background:#0e0e18;border:1px solid #2a2a3e;border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:.8rem;padding:9px 12px;resize:none;min-height:48px;max-height:120px;outline:none;transition:border .2s}
.ia-input-row textarea:focus{border-color:var(--accent)}
.ia-input-row textarea::placeholder{color:#444}
.ia-send-btn{padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.8rem;font-weight:700;color:#fff;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .2s}
.ia-send-btn:hover{opacity:.85;transform:translateY(-1px)}
.ia-send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ═══ MD RESPONSE ═══ */
.ia-response,.lab-body .md-content{font-size:.84rem;color:#ccc;line-height:1.7;overflow-x:auto}
.ia-response{margin-top:10px;background:#0b0b14;border:1px solid #1e1e2e;border-radius:10px;padding:14px 16px;display:none}
.ia-response.visible{display:block}
.ia-response h1,.ia-response h2,.ia-response h3,.lab-body h1,.lab-body h2,.lab-body h3{color:#fff;margin:14px 0 8px;font-weight:800}
.ia-response h1,.lab-body h1{font-size:1.1rem;border-bottom:1px solid #2a2a3e;padding-bottom:6px}
.ia-response h2,.lab-body h2{font-size:1rem}
.ia-response h3,.lab-body h3{font-size:.92rem}
.ia-response p,.lab-body p{margin:6px 0}
.ia-response ul,.ia-response ol,.lab-body ul,.lab-body ol{margin:6px 0 6px 20px}
.ia-response li,.lab-body li{margin:4px 0}
.ia-response em,.lab-body em{color:#a78bfa;font-style:italic}
.ia-response strong,.lab-body strong{color:#fff}
.ia-response code,.lab-body code{background:#1a1a28;padding:2px 6px;border-radius:4px;font-size:.8rem;color:#f59e0b}
.ia-response pre,.lab-body pre{background:#0d0d1a;border:1px solid #1e1e2e;border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto}
.ia-response pre code,.lab-body pre code{background:none;padding:0;color:#ccc}
.ia-response blockquote,.lab-body blockquote{border-left:3px solid var(--accent,#7c3aed);padding:8px 14px;margin:8px 0;background:#0d0d1a;border-radius:0 8px 8px 0;color:#aaa}
.ia-response table,.lab-body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.82rem}
.ia-response th,.lab-body th{background:#1a1a28;padding:8px 10px;text-align:left;font-weight:700;color:#fff;border-bottom:2px solid #333}
.ia-response td,.lab-body td{padding:7px 10px;border-bottom:1px solid #1a1a2e;color:#ccc}
.ia-response hr,.lab-body hr{border:none;border-top:1px solid #2a2a3e;margin:14px 0}
.ia-thinking{display:inline-flex;align-items:center;gap:6px;color:#666;font-size:.78rem}
.ia-thinking span{width:5px;height:5px;border-radius:50%;background:#666;animation:pulse 1.2s infinite}
.ia-thinking span:nth-child(2){animation-delay:.2s}
.ia-thinking span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ═══ OVERLAYS ═══ */
.overlay{position:fixed;inset:0;backdrop-filter:blur(14px);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.active{display:flex}
.overlay.bg-dark{background:rgba(0,0,0,.92)}
.panel{border-radius:28px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:panelIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes panelIn{from{transform:translateY(40px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.panel-close{position:absolute;top:18px;right:20px;background:#1a1a28;border:none;color:#777;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:5}
.panel-close:hover{background:#2a2a3e;color:#fff}

/* ═══ LAB MODAL ═══ */
.lab-panel{background:#0c0c17;border:1px solid #2a2a40;max-width:900px}
.lab-header{padding:28px 28px 20px;position:sticky;top:0;background:#0c0c17;z-index:2;border-bottom:1px solid #1a1a2e}
.lab-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.lab-title{font-size:1.2rem;font-weight:800;line-height:1.35;margin-bottom:6px}
.lab-meta{font-size:.78rem;color:#555}
.lab-body{padding:24px 28px 30px}
.lab-loader{display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 20px;color:#555;font-size:.9rem}
.lab-spinner{width:40px;height:40px;border:3px solid #1e1e2e;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ ATLAS DE IMAGENES ═══ */
.atlas-section{margin:20px 0}
.atlas-title{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.atlas-title::after{content:'';flex:1;height:1px;background:#1e1e2e}
.atlas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.atlas-card{background:#0e0e1a;border:1px solid #1e1e2e;border-radius:14px;overflow:hidden;cursor:pointer;transition:all .3s}
.atlas-card:hover{border-color:#444;transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.atlas-card img{width:100%;height:160px;object-fit:cover;background:#111;display:block}
.atlas-card svg{width:100%;height:160px;display:block}
.atlas-card .svg-placeholder{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,#0e0e1a,#151528)}
.atlas-card .atlas-caption{padding:10px 12px}
.atlas-card .atlas-caption-title{font-size:.8rem;font-weight:700;color:#e0e0e0;margin-bottom:3px}
.atlas-card .atlas-caption-desc{font-size:.72rem;color:#666;line-height:1.4}
.atlas-card .atlas-caption-source{font-size:.65rem;color:#444;margin-top:5px;display:flex;align-items:center;gap:4px}
.atlas-card .atlas-caption-source a{color:var(--accent);text-decoration:none}
.atlas-card .atlas-caption-source a:hover{text-decoration:underline}

/* Image lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:5000;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain;box-shadow:0 0 60px rgba(0,0,0,.8)}
.lightbox-caption{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111;padding:10px 20px;border-radius:12px;font-size:.85rem;color:#ccc;max-width:600px;text-align:center;border:1px solid #2a2a3e}

/* ═══ PUBMED CITATIONS ═══ */
.citations-section{margin:20px 0}
.citation-item{display:flex;gap:12px;padding:12px;background:#0e0e1a;border:1px solid #1a1a2e;border-radius:12px;margin-bottom:10px;transition:all .2s}
.citation-item:hover{border-color:#333;background:#111}
.citation-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;flex-shrink:0}
.citation-body{flex:1}
.citation-title{font-size:.84rem;font-weight:700;color:#e0e0e0;margin-bottom:3px;line-height:1.4}
.citation-title a{color:inherit;text-decoration:none}
.citation-title a:hover{color:var(--accent);text-decoration:underline}
.citation-authors{font-size:.75rem;color:#666;margin-bottom:2px}
.citation-journal{font-size:.72rem;color:#555;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.citation-journal .pmid{color:var(--accent);font-weight:700}
.citation-journal a{color:var(--accent);text-decoration:none;font-weight:600}
.citation-journal a:hover{text-decoration:underline}

/* ═══ QUIZ MODAL ═══ */
.quiz-panel{background:#0b0b16;border:1px solid #222240;max-width:720px}
.quiz-header{padding:28px 28px 20px;position:sticky;top:0;background:#0b0b16;z-index:2;border-bottom:1px solid #1a1a2e}
.quiz-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.quiz-progress-bar{height:6px;background:#1a1a2e;border-radius:3px;margin-top:14px;overflow:hidden}
.quiz-progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.quiz-progress-text{font-size:.72rem;color:#555;margin-top:6px;text-align:right}
.quiz-body{padding:24px 28px 30px}
.quiz-loader{display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 20px;color:#555}
.quiz-question{margin-bottom:24px}
.quiz-q-number{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.quiz-q-text{font-size:1rem;font-weight:700;line-height:1.5;color:#e0e0e0;margin-bottom:16px}
.quiz-q-text em{color:#a78bfa}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-opt{background:#12121e;border:2px solid #1e1e30;border-radius:14px;padding:14px 18px;cursor:pointer;transition:all .2s;display:flex;gap:12px;align-items:flex-start;font-size:.88rem;color:#ccc;line-height:1.5}
.quiz-opt:hover:not(.locked){border-color:#444;background:#16162a}
.quiz-opt.selected{border-color:var(--accent);background:#16162a}
.quiz-opt.correct{border-color:#22c55e!important;background:rgba(34,197,94,.08)!important}
.quiz-opt.correct .opt-letter{background:#22c55e;color:#000}
.quiz-opt.wrong{border-color:#ef4444!important;background:rgba(239,68,68,.08)!important}
.quiz-opt.wrong .opt-letter{background:#ef4444;color:#000}
.quiz-opt.locked{cursor:default;opacity:.7}
.quiz-opt.locked.correct,.quiz-opt.locked.wrong{opacity:1}
.opt-letter{width:28px;height:28px;border-radius:8px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;transition:all .2s}
.opt-text{flex:1}
.opt-text em{color:#a78bfa}
.quiz-explanation{margin-top:12px;padding:12px 16px;background:#0d0d1a;border-left:3px solid var(--accent);border-radius:0 10px 10px 0;font-size:.84rem;color:#aaa;line-height:1.6;display:none}
.quiz-explanation.visible{display:block}
.quiz-explanation em{color:#a78bfa}
.quiz-explanation strong{color:#fff}
.quiz-nav{display:flex;justify-content:space-between;margin-top:24px;padding-top:20px;border-top:1px solid #1a1a2e}
.quiz-nav-btn{padding:11px 24px;border-radius:12px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.quiz-nav-btn:hover{transform:translateY(-2px)}
.quiz-nav-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.quiz-nav-btn.primary{color:#fff}
.quiz-nav-btn.sec{background:#1a1a28;color:#888;border:1px solid #2a2a3e}
.quiz-nav-btn.sec:hover{color:#fff;background:#222}
.quiz-results{text-align:center;padding:20px 0}
.results-score{font-size:3.5rem;font-weight:900;margin:16px 0 8px}
.results-label{font-size:1rem;color:#888;margin-bottom:6px}
.results-msg{font-size:1.1rem;font-weight:600;margin-bottom:24px}
.results-breakdown{text-align:left;margin-top:20px}
.rb-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1a1a2e;font-size:.85rem}
.rb-item:last-child{border-bottom:none}
.rb-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;font-weight:800}
.rb-icon.correct{background:rgba(34,197,94,.15);color:#22c55e}
.rb-icon.wrong{background:rgba(239,68,68,.15);color:#ef4444}
.rb-text{flex:1;color:#ccc}
.rb-text em{color:#a78bfa}
.rb-answer{font-size:.78rem;color:#666}
.results-actions{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}

/* ═══ AREA MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#13131a;border:1px solid #2a2a3e;border-radius:24px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:32px;position:relative;animation:panelIn .3s ease}
.modal-close{position:absolute;top:16px;right:16px;background:#222;border:none;color:#888;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:#333;color:#fff}

/* ═══ TIMELINE ═══ */
.timeline-section{max-width:900px;margin:0 auto 60px;padding:0 20px}
.timeline-section h2{text-align:center;font-size:1.1rem;color:#888;text-transform:uppercase;letter-spacing:2px;margin-bottom:30px}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#7c3aed,#00d4ff,transparent)}
.timeline-item{position:relative;margin-bottom:24px;padding-left:20px}
.timeline-item .tl-label{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:4px}
.timeline-item .tl-title{font-size:.95rem;font-weight:600;color:#e0e0e0}
.timeline-item .tl-desc{font-size:.8rem;color:#666;margin-top:4px}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>
<body>

<header>
  <h1>🦷 Mapa de Estudio — Odontologia</h1>
  <p>🔬 Laboratorio + Atlas Clinico &nbsp;·&nbsp; 💬 Consulta IA &nbsp;·&nbsp; 🧠 Quiz</p>
</header>

<div class="search-bar"><input type="text" id="searchInput" placeholder="Buscar tema... (ej: NiTi, adhesion, CBCT)" /></div>

<section class="progress-section">
  <h2>Areas principales</h2>
  <div class="progress-grid" id="progressGrid"></div>
</section>

<div class="main-grid" id="mainGrid"></div>

<section class="timeline-section">
  <h2>Ruta de aprendizaje sugerida</h2>
  <div class="timeline" id="timeline"></div>
</section>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><button class="modal-close" id="modalClose">✕</button><div id="modalContent"></div></div></div>
<div class="overlay bg-dark" id="labOverlay"><div class="panel lab-panel" id="labPanel" style="--accent:#7c3aed"><button class="panel-close" id="labClose">✕</button><div class="lab-header" id="labHeader"></div><div class="lab-body" id="labBody"></div></div></div>
<div class="overlay bg-dark" id="quizOverlay"><div class="panel quiz-panel" id="quizPanel" style="--accent:#7c3aed"><button class="panel-close" id="quizClose">✕</button><div class="quiz-header" id="quizHeader"></div><div class="quiz-body" id="quizBody"></div></div></div>
<div class="lightbox" id="lightbox"><img id="lightboxImg" /><div class="lightbox-caption" id="lightboxCap"></div></div>

<script>
marked.setOptions({ breaks: true, gfm: true });
function md(t) { return marked.parse(t || ''); }

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
const API = {
  url: 'https://api.anthropic.com/v1/messages',
  key: localStorage.getItem('anthropic_key') || '',
  model: 'claude-haiku-4-5'
};

// Prompt for API key if not set
if (!API.key) {
  const k = prompt('🔑 Enter your Anthropic API key to enable AI features:\n(Get one at console.anthropic.com)');
  if (k && k.startsWith('sk-ant')) { API.key = k; localStorage.setItem('anthropic_key', k); }
}

async function askAI(messages, onChunk) {
  let system = '';
  const filtered = [];
  for (const m of messages) { if (m.role === 'system') system = m.content; else filtered.push(m); }
  const body = { model: API.model, max_tokens: 4096, stream: !!onChunk, messages: filtered };
  if (system) body.system = system;
  const res = await fetch(API.url, {
    method: 'POST',
    headers: { 'x-api-key': API.key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const e = await res.text(); throw new Error(`API ${res.status}: ${e.substring(0,120)}`); }
  if (!onChunk) { const d = await res.json(); return d.content[0].text; }
  const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines) { if (!line.startsWith('data:')) continue; const p = line.slice(5).trim(); if (p === '[DONE]') return; try { const j = JSON.parse(p); if (j.type === 'content_block_delta' && j.delta?.text) onChunk(j.delta.text); } catch {} }
  }
}

async function fetchPMCImages(query) {
  try {
    const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pmc&term=${encodeURIComponent(query + ' dental oral')}&retmax=5&retmode=json`;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    const searchRes = await fetch(searchUrl, { signal: controller.signal });
    clearTimeout(timeout);
    const searchData = await searchRes.json();
    const ids = searchData?.esearchresult?.idlist || [];
    if (ids.length === 0) return [];
    const summaryUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pmc&id=${ids.join(',')}&retmode=json`;
    const controller2 = new AbortController();
    const timeout2 = setTimeout(() => controller2.abort(), 5000);
    const summaryRes = await fetch(summaryUrl, { signal: controller2.signal });
    clearTimeout(timeout2);
    const summaryData = await summaryRes.json();
    const results = [];
    for (const id of ids) {
      const article = summaryData?.result?.[id];
      if (article) results.push({ title: article.title || 'PMC Article', authors: article.sortfirstauthor || '', journal: article.fulljournalname || article.source || '', year: (article.pubdate || '').substring(0, 4), pmcid: 'PMC' + id, url: `https://www.ncbi.nlm.nih.gov/pmc/articles/PMC${id}/` });
    }
    return results;
  } catch(e) { console.log('PMC fetch failed (expected):', e.message); return []; }
}

async function sendConsole(q, topic, area, btn, respEl) {
  btn.disabled = true; respEl.className = 'ia-response visible';
  respEl.innerHTML = '<span class="ia-thinking"><span></span><span></span><span></span> Pensando...</span>';
  const sys = 'Eres un asistente de investigacion clinica de elite. Responde en espanol academico con Markdown. Terminologia tecnica en *ingles cursivas*. Al final incluye consejo clinico practico.';
  try { let full = ''; await askAI([{role:'system',content:sys},{role:'user',content:`Tema: ${topic.name} (${area.title})\n\nPregunta: ${q}`}], chunk => { full += chunk; respEl.innerHTML = md(full); }); } catch (err) { respEl.innerHTML = `<span style="color:#f87171">Error: ${err.message}</span>`; }
  btn.disabled = false;
}

async function openLab(topic, area) {
  const color = area.color;
  const panel = document.getElementById('labPanel'); panel.style.setProperty('--accent', color);
  document.getElementById('labHeader').innerHTML = `<div class="lab-badge" style="background:${color}22;color:${color}">🔬 Laboratorio Clinico + Atlas</div><div class="lab-title">${topic.name}</div><div class="lab-meta">📰 ${topic.article.journalShort} · ${topic.article.year} · ${topic.article.authors}</div>`;
  document.getElementById('labBody').innerHTML = `<div class="lab-loader"><div class="lab-spinner" style="border-top-color:${color}"></div>Generando metodologia + atlas clinico con IA...</div>`;
  document.getElementById('labOverlay').classList.add('active');

  // Fetch AI content + PMC articles in parallel
  // Atlas diagrams generated inline via SVG
  const pmcPromise = fetchPMCImages(topic.name);

  const prompt = `Genera una METODOLOGIA DE ESTUDIO COMPLETA sobre: "${topic.name}" en odontologia.
Usa Markdown rico: ## secciones, **bold**, *cursivas para terminos en ingles*, listas, tablas.

Estructura:
## 🔑 Key Concepts
5-7 conceptos clave. Terminos en *ingles* con explicacion en espanol.

## 📊 Evidencia Cientifica
Referencia: "${topic.article.title}" (${topic.article.authors}, ${topic.article.year}). 4-5 hallazgos clave.

## 🦷 Protocolo Clinico
5-7 pasos numerados aplicables en hospital universitario.

## 🎯 El Reto
Pregunta de analisis critico clinico desafiante.

Espanol academico. Terminologia tecnica en *ingles*.`;

  try {
    const [response, pmcArticles] = await Promise.all([
      askAI([{role:'user',content:prompt}]),
      pmcPromise
    ]);

    // Build atlas section
    // Generate SVG clinical diagrams
    const svgDiagram = getSVGForTopic(topic.name, color);
    const atlasHtml = `
      <div class="atlas-section">
        <div class="atlas-title" style="color:${color}">🖼️ Atlas Clinico — Diagramas de Referencia</div>
        <div class="atlas-grid">
          <div class="atlas-card" onclick="openLightbox(null,'${topic.name}: Diagrama anatomico clinico')">
            ${svgDiagram}
            <div class="atlas-caption">
              <div class="atlas-caption-title">${topic.name}</div>
              <div class="atlas-caption-desc">Diagrama anatomico clinico interactivo</div>
              <div class="atlas-caption-source">📐 SVG Clinical Diagram</div>
            </div>
          </div>
          <div class="atlas-card">
            <div class="svg-placeholder" style="background:linear-gradient(135deg,${color}11,#0e0e1a);font-size:2.5rem">📊</div>
            <div class="atlas-caption">
              <div class="atlas-caption-title">Datos Clave</div>
              <div class="atlas-caption-desc">Resumen visual de hallazgos del articulo principal</div>
              <div class="atlas-caption-source">📰 ${topic.article.journalShort} ${topic.article.year}</div>
            </div>
          </div>
          <div class="atlas-card" onclick="window.open('https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(topic.name+' dental')}&filter=simsearch1.fha','_blank')">
            <div class="svg-placeholder" style="background:linear-gradient(135deg,#0a1a0a,#0e0e1a);font-size:2.5rem">🔬</div>
            <div class="atlas-caption">
              <div class="atlas-caption-title">PubMed Images</div>
              <div class="atlas-caption-desc">Buscar imagenes clinicas reales en PubMed — click para abrir</div>
              <div class="atlas-caption-source" style="color:#22c55e">🔗 pubmed.ncbi.nlm.nih.gov</div>
            </div>
          </div>
        </div>
      </div>`;

    // Build citations section
    const allCitations = [...(ATLAS_CITATIONS[topic.name] || [])];
    // Add PMC articles as supplementary citations
    pmcArticles.forEach(a => {
      if (!allCitations.find(c => c.title === a.title)) {
        allCitations.push({ title: a.title, authors: a.authors, journal: a.journal, year: a.year, pmid: a.pmcid, url: a.url });
      }
    });
    // Always include the topic's main article
    if (!allCitations.find(c => c.url === topic.article.url)) {
      allCitations.unshift({ title: topic.article.title, authors: topic.article.authors, journal: topic.article.journalShort, year: topic.article.year, url: topic.article.url, pmid: topic.article.url.match(/\/(\d+)\/?$/)?.[1] || '' });
    }

    let citationsHtml = '';
    if (allCitations.length > 0) {
      citationsHtml = `
        <div class="citations-section">
          <div class="atlas-title" style="color:${color}">📚 Citas Verificadas — PubMed / PMC</div>
          ${allCitations.map((c,i) => `
            <div class="citation-item">
              <div class="citation-num" style="background:${color}22;color:${color}">${i+1}</div>
              <div class="citation-body">
                <div class="citation-title"><a href="${c.url}" target="_blank">${c.title}</a></div>
                <div class="citation-authors">${c.authors}</div>
                <div class="citation-journal">
                  <span>${c.journal} · ${c.year}</span>
                  ${c.pmid ? `<span class="pmid">PMID: ${c.pmid}</span>` : ''}
                  <a href="${c.url}" target="_blank">🔗 Ver en PubMed</a>
                </div>
              </div>
            </div>
          `).join('')}
        </div>`;
    }

    document.getElementById('labBody').innerHTML = `
      <div class="md-content">${md(response)}</div>
      ${atlasHtml}
      ${citationsHtml}
      <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;border-top:1px solid #1a1a2e;padding-top:20px">
        <a href="${topic.article.url}" target="_blank" class="action-btn" style="background:${color};padding:11px 22px;font-size:.88rem;text-decoration:none">🔗 Articulo principal en PubMed</a>
        <a href="https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(topic.name + ' dental')}" target="_blank" class="action-btn" style="background:#1a1a28;color:#888;border:1px solid #2a2a3e;padding:11px 20px;font-size:.88rem;text-decoration:none">🔍 Buscar mas en PubMed</a>
        <button class="action-btn" style="background:#1a1a28;color:#888;border:1px solid #2a2a3e;padding:11px 20px;font-size:.88rem" onclick="document.getElementById('labOverlay').classList.remove('active')">✕ Cerrar</button>

  }

let quizState = null;
async function openQuiz(topic, area) {
  const color = area.color;
  const panel = document.getElementById('quizPanel'); panel.style.setProperty('--accent', color);
  document.getElementById('quizHeader').innerHTML = `<div class="quiz-badge" style="background:${color}22;color:${color}">🧠 Quiz</div><div class="lab-title">${topic.name}</div><div class="lab-meta">${area.title} · 10 preguntas</div><div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill" style="background:${color};width:0%"></div></div><div class="quiz-progress-text" id="quizProgressText">0 / 10</div>`;
  document.getElementById('quizBody').innerHTML = `<div class="quiz-loader"><div class="lab-spinner" style="border-top-color:${color}"></div>Generando 10 preguntas con IA...</div>`;
  document.getElementById('quizOverlay').classList.add('active');
  const prompt = `Genera exactamente 10 preguntas de opcion multiple sobre "${topic.name}" en odontologia. Nivel avanzado/residente. Terminologia tecnica en *ingles*.
Responde UNICAMENTE en JSON valido:
[{"q":"Pregunta","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0,"explanation":"Explicacion detallada con *terminos en ingles*."}]
Dificultad progresiva. Cubrir: conceptos, evidencia, protocolo y casos clinicos.`;
  try {
    let raw = await askAI([{role:'user',content:prompt}]);
    const jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    const questions = JSON.parse(jsonMatch[0]); if (questions.length < 10) throw new Error('<10 preguntas');
    quizState = { questions: questions.slice(0,10), answers: new Array(10).fill(null), current: 0, color, topic, area };
    renderQuizQ();
  } catch (err) { document.getElementById('quizBody').innerHTML = `<div style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:12px;padding:16px;color:#f87171">Error: ${err.message}</div>`; }
}
function renderQuizQ() {
  const s = quizState, q = s.questions[s.current], n = s.current + 1, answered = s.answers[s.current] !== null;
  document.getElementById('quizProgressFill').style.width = `${(n/10)*100}%`;
  document.getElementById('quizProgressText').textContent = `${n} / 10`;
  const optHtml = q.options.map((opt,i) => {
    const letters = ['A','B','C','D']; let cls = 'quiz-opt';
    if (answered) { cls += ' locked'; if (i===q.correct) cls += ' correct'; else if (i===s.answers[s.current]&&i!==q.correct) cls += ' wrong'; }
    return `<div class="${cls}" data-oi="${i}"><div class="opt-letter">${letters[i]}</div><div class="opt-text">${md(opt.replace(/^[A-D]\)\s*/,''))}</div></div>`;
  }).join('');
  const isLast = s.current === 9;
  document.getElementById('quizBody').innerHTML = `
    <div class="quiz-question"><div class="quiz-q-number" style="color:${s.color}">Pregunta ${n} de 10</div><div class="quiz-q-text">${md(q.q)}</div><div class="quiz-options">${optHtml}</div><div class="quiz-explanation ${answered?'visible':''}" style="--accent:${s.color}">${answered?md('**Explicacion:** '+q.explanation):''}</div></div>
    <div class="quiz-nav"><button class="quiz-nav-btn sec" ${s.current===0?'disabled':''} id="qPrev">← Anterior</button><div>${!answered?`<button class="quiz-nav-btn primary" style="background:${s.color}" id="qCheck" disabled>Verificar</button>`:''}${answered?(isLast?`<button class="quiz-nav-btn primary" style="background:${s.color}" id="qFinish">📊 Resultados</button>`:`<button class="quiz-nav-btn primary" style="background:${s.color}" id="qNext">Siguiente →</button>`):''}</div></div>`;
  if (!answered) { let sel = null; document.querySelectorAll('.quiz-opt').forEach(o => { o.onclick = () => { document.querySelectorAll('.quiz-opt').forEach(x=>x.classList.remove('selected')); o.classList.add('selected'); sel=+o.dataset.oi; const cb=document.getElementById('qCheck'); if(cb)cb.disabled=false; }; }); const cb=document.getElementById('qCheck'); if(cb)cb.onclick=()=>{if(sel!==null){s.answers[s.current]=sel;renderQuizQ();}}; }
  const pb=document.getElementById('qPrev'); if(pb)pb.onclick=()=>{if(s.current>0){s.current--;renderQuizQ();}};
  const nb=document.getElementById('qNext'); if(nb)nb.onclick=()=>{if(s.current<9){s.current++;renderQuizQ();}};
  const fb=document.getElementById('qFinish'); if(fb)fb.onclick=renderQuizResults;
}
function renderQuizResults() {
  const s = quizState; let correct = 0;
  const bd = s.questions.map((q,i) => { const ok = s.answers[i]===q.correct; if(ok)correct++; const L=['A','B','C','D']; return {q:q.q,isCorrect:ok,yours:L[s.answers[i]],right:L[q.correct],explanation:q.explanation}; });
  const pct = Math.round((correct/10)*100);
  let msg,mc; if(pct>=90){msg='🏆 Excelente!';mc='#22c55e';}else if(pct>=70){msg='👍 Buen trabajo';mc='#00d4ff';}else if(pct>=50){msg='📚 A repasar';mc='#f59e0b';}else{msg='⚠️ Necesitas estudiar mas';mc='#ef4444';}
  const wrong=bd.filter(b=>!b.isCorrect), right=bd.filter(b=>b.isCorrect);
  document.getElementById('quizBody').innerHTML = `
    <div class="quiz-results"><div class="results-label">Resultado en</div><div class="lab-title">${s.topic.name}</div><div class="results-score" style="color:${pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444'}">${pct}%</div><div class="results-label">${correct}/10 correctas</div><div class="results-msg" style="color:${mc}">${msg}</div></div>
    ${wrong.length?`<div class="results-breakdown"><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:#ef4444;margin-bottom:10px">❌ Incorrectas — Estudia estos puntos</div>${wrong.map(b=>`<div class="rb-item"><div class="rb-icon wrong">✗</div><div style="flex:1"><div class="rb-text">${md(b.q)}</div><div class="rb-answer">Tu: <strong style="color:#ef4444">${b.yours}</strong> · Correcta: <strong style="color:#22c55e">${b.right}</strong></div><div style="margin-top:6px;font-size:.82rem;color:#888;line-height:1.5">${md(b.explanation)}</div></div></div>`).join('')}</div>`:''}
    ${right.length?`<div class="results-breakdown" style="margin-top:20px"><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:#22c55e;margin-bottom:10px">✅ Correctas</div>${right.map(b=>`<div class="rb-item"><div class="rb-icon correct">✓</div><div class="rb-text">${md(b.q)}</div></div>`).join('')}</div>`:''}
    <div class="results-actions"><button class="quiz-nav-btn primary" style="background:${s.color}" onclick="openQuiz(quizState.topic,quizState.area)">🔄 Repetir</button><button class="quiz-nav-btn sec" onclick="document.getElementById('quizOverlay').classList.remove('active')">✕ Cerrar</button></div>`;
}

    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px"><span style="font-size:2rem">${item.icon}</span><div><h2 style="color:${item.color};font-size:1.3rem">${item.title}</h2><div style="color:#666;font-size:.8rem">${item.subtitle}</div></div></div>
    <p style="color:#888;font-size:.88rem;line-height:1.6;margin-bottom:20px">${item.description}</p>
    ${item.topics.map(t=>`<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #1e1e2e;font-size:.85rem"><span style="color:${item.color}">▸</span><div><strong>${t.name}</strong><div style="color:#555;font-size:.78rem;margin-top:2px">${t.desc}</div></div></div>`).join('')}`;
  document.getElementById('modalOverlay').classList.add('active');
}

// ══════════════════════════════════════════════
// TIMELINE
// ══════════════════════════════════════════════
function renderTimeline() {
  const tl = document.getElementById('timeline');
  TIMELINE.forEach((item,i) => {
    const el = document.createElement('div'); el.className = 'timeline-item';
    el.innerHTML = `<div class="tl-label" style="color:${item.color}">${item.label}</div><div class="tl-title">${item.title}</div><div class="tl-desc">${item.desc}</div>`;
    tl.appendChild(el);
    const s = document.createElement('style');
    s.textContent = `.timeline-item:nth-child(${i+1})::before{content:'';width:10px;height:10px;background:${item.color};border-color:${item.color};border-radius:50%;position:absolute;left:-26px;top:6px;border:2px solid}`;
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════
document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('active');
document.getElementById('modalOverlay').onclick = e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('labClose').onclick = () => document.getElementById('labOverlay').classList.remove('active');
document.getElementById('labOverlay').onclick = e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('quizClose').onclick = () => document.getElementById('quizOverlay').classList.remove('active');
document.getElementById('quizOverlay').onclick = e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('searchInput').oninput = e => renderGrid(e.target.value.toLowerCase().trim());
document.onkeydown = e => {
  if(e.key==='Escape'){ document.querySelectorAll('.overlay,.modal-overlay,.lightbox').forEach(o=>o.classList.remove('active')); }
  if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){e.preventDefault();document.getElementById('searchInput').focus();}
};

renderProgress(); renderGrid(); renderTimeline();
</script>
</body>
</html>
