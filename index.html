    card.querySelectorAll('[data-ask]').forEach(function(b) { b.onclick = function(e) { e.stopPropagation(); var c = document.getElementById('con-' + b.dataset.ask + '-' + b.dataset.ati); c.classList.toggle('open'); if(c.classList.contains('open')) c.querySelector('textarea').focus(); }; });
    card.querySelectorAll('[data-quiz]').forEach(function(b) { b.onclick = function(e) { e.stopPropagation(); var a = DATA.find(function(d){return d.id===b.dataset.quiz;}); openQuiz(a.topics[+b.dataset.qti], a); }; });
    card.querySelectorAll('[data-clinical]').forEach(function(b) { b.onclick = function(e) { e.stopPropagation(); var a = DATA.find(function(d){return d.id===b.dataset.clinical;}); openClinicalCase(a.topics[+b.dataset.cti], a); }; });
    card.querySelectorAll('[data-flash]').forEach(function(b) { b.onclick = function(e) { e.stopPropagation(); var a = DATA.find(function(d){return d.id===b.dataset.flash;}); openFlashcards(a.topics[+b.dataset.fti], a); }; });
    card.querySelectorAll('[data-send]').forEach(function(b) { b.onclick = function(e) { e.stopPropagation(); var a = DATA.find(function(d){return d.id===b.dataset.send;}); var t = a.topics[+b.dataset.sti]; var con = document.getElementById('con-' + a.id + '-' + b.dataset.sti); var q = con.querySelector('textarea').value.trim(); if(q) sendConsole(q, t, a, b, document.getElementById('resp-' + a.id + '-' + b.dataset.sti)); }; });
    card.querySelectorAll('.ia-input-row textarea').forEach(function(ta) { ta.onkeydown = function(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.closest('.ia-console').querySelector('[data-send]').click();} }; });
    card.querySelectorAll('[data-expandable]').forEach(function(row) { row.onclick = function(e) { row.closest('.topic-item').classList.toggle('expanded'); }; });
    card.querySelectorAll('.notes-toggle').forEach(function(btn) { btn.onclick = function(e) { e.stopPropagation(); var area = document.getElementById('notes-' + btn.dataset.nkey); area.classList.toggle('open'); }; });
    card.querySelectorAll('.notes-area textarea').forEach(function(ta) { ta.onblur = function() { saveNote(ta.dataset.nkey, ta.value); }; });
    g.appendChild(card);
  });
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

  } catch (err) {
    console.error('Lab error:', err);
    document.getElementById('labBody').innerHTML = '<div style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:12px;padding:16px;color:#f87171">Error: ' + err.message + '</div>';
  }

// QUIZ
// ══════════════════════════════════════════════
var quizState = null;
async function openQuiz(topic, area) {
  var color = area.color;
  var panel = document.getElementById('quizPanel'); panel.style.setProperty('--accent', color);
  document.getElementById('quizHeader').innerHTML = '<div class="quiz-badge" style="background:' + color + '22;color:' + color + '">🧠 Quiz</div><div class="lab-title">' + topic.name + '</div><div class="lab-meta">' + area.title + ' · 10 preguntas</div><div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill" style="background:' + color + ';width:0%"></div></div><div class="quiz-progress-text" id="quizProgressText">0 / 10</div>';
  document.getElementById('quizBody').innerHTML = '<div class="skeleton"><div class="skeleton-line header"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-line header"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>';
  document.getElementById('quizOverlay').classList.add('active');
  var prompt = 'Genera exactamente 10 preguntas de opcion multiple sobre "' + topic.name + '" en odontologia. Nivel avanzado/residente. Terminologia tecnica en *ingles*.\nResponde UNICAMENTE en JSON valido:\n[{"q":"Pregunta","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0,"explanation":"Explicacion detallada con *terminos en ingles*."}]\nDificultad progresiva. Cubrir: conceptos, evidencia, protocolo y casos clinicos.';
  // FREEMIUM: use static questions if not premium
  if (!isPremium() && STATIC_QUESTIONS[area.id] && STATIC_QUESTIONS[area.id].length >= 10) {
    var pool = STATIC_QUESTIONS[area.id].slice();
    // Shuffle and pick 10
    for (var si = pool.length - 1; si > 0; si--) { var sj = Math.floor(Math.random() * (si + 1)); var tmp = pool[si]; pool[si] = pool[sj]; pool[sj] = tmp; }
    var questions = pool.slice(0, 10);
    quizState = { questions: questions, answers: new Array(10).fill(null), current: 0, color: color, topic: topic, area: area };
    renderQuizQ();
    return;
  }
  if (!isPremium()) { showPremiumGate(document.getElementById('quizBody'), 'Quiz con IA ilimitado'); return; }
  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var questions = JSON.parse(jsonMatch[0]); if (questions.length < 10) throw new Error('<10 preguntas');
    quizState = { questions: questions.slice(0,10), answers: new Array(10).fill(null), current: 0, color: color, topic: topic, area: area };
    renderQuizQ();
  } catch (err) { document.getElementById('quizBody').innerHTML = '<div style="background:#1a0a0a;border:1px solid #3a1a1a;border-radius:12px;padding:16px;color:#f87171">Error: ' + err.message + '</div>'; }
}
function renderQuizQ() {
  var s = quizState, q = s.questions[s.current], n = s.current + 1, answered = s.answers[s.current] !== null;
  document.getElementById('quizProgressFill').style.width = ((n/10)*100) + '%';
  document.getElementById('quizProgressText').textContent = n + ' / 10';
  var letters = ['A','B','C','D'];
  var optHtml = '';
  q.options.forEach(function(opt, i) {
    var cls = 'quiz-opt';
    if (answered) { cls += ' locked'; if (i===q.correct) cls += ' correct'; else if (i===s.answers[s.current]&&i!==q.correct) cls += ' wrong'; }
    optHtml += '<div class="' + cls + '" data-oi="' + i + '"><div class="opt-letter">' + letters[i] + '</div><div class="opt-text">' + md(opt.replace(/^[A-D]\)\s*/,'')) + '</div></div>';
  });
  var isLast = s.current === 9;
  document.getElementById('quizBody').innerHTML =
    '<div class="quiz-question"><div class="quiz-q-number" style="color:' + s.color + '">Pregunta ' + n + ' de 10</div><div class="quiz-q-text">' + md(q.q) + '</div><div class="quiz-options">' + optHtml + '</div><div class="quiz-explanation ' + (answered?'visible':'') + '" style="--accent:' + s.color + '">' + (answered?md('**Explicacion:** '+q.explanation):'') + '</div></div>' +
    '<div class="quiz-nav"><button class="quiz-nav-btn sec" ' + (s.current===0?'disabled':'') + ' id="qPrev">← Anterior</button><div>' + (!answered?'<button class="quiz-nav-btn primary" style="background:' + s.color + '" id="qCheck" disabled>Verificar</button>':'') + (answered?(isLast?'<button class="quiz-nav-btn primary" style="background:' + s.color + '" id="qFinish">📊 Resultados</button>':'<button class="quiz-nav-btn primary" style="background:' + s.color + '" id="qNext">Siguiente →</button>'):'') + '</div></div>';
  if (!answered) {
    var sel = null;
    document.querySelectorAll('.quiz-opt').forEach(function(o) {
      o.onclick = function() { document.querySelectorAll('.quiz-opt').forEach(function(x){x.classList.remove('selected');}); o.classList.add('selected'); sel=+o.dataset.oi; var cb=document.getElementById('qCheck'); if(cb)cb.disabled=false; };
    });
    var cb=document.getElementById('qCheck'); if(cb) cb.onclick=function(){if(sel!==null){s.answers[s.current]=sel;renderQuizQ();}};
  }
  var pb=document.getElementById('qPrev'); if(pb) pb.onclick=function(){if(s.current>0){s.current--;renderQuizQ();}};
  var nb=document.getElementById('qNext'); if(nb) nb.onclick=function(){if(s.current<9){s.current++;renderQuizQ();}};
  var fb=document.getElementById('qFinish'); if(fb) fb.onclick=renderQuizResults;
}
function renderQuizResults() {
  var s = quizState; var correct = 0;

  try {

function renderClinicalStep() {
  var s = clinicalState;
  var c = s.data;
  var cont = document.getElementById('clinicalModalContent');
  if (s.current >= c.steps.length) { renderClinicalResults(); return; }
  var step = c.steps[s.current];
  var answered = s.answers[s.current] !== undefined;
  var letters = ['A','B','C','D'];
  var optHtml = '';
  step.options.forEach(function(opt, i) {
    var cls = 'quiz-opt';
    if (answered) { cls += ' locked'; if (i===step.correct) cls += ' correct'; else if (i===s.answers[s.current] && i!==step.correct) cls += ' wrong'; }
    optHtml += '<div class="' + cls + '" data-ci="' + i + '"><div class="opt-letter">' + letters[i] + '</div><div class="opt-text">' + md(opt) + '</div></div>';
  });
  cont.innerHTML =
    '<div style="margin-bottom:20px"><div class="quiz-badge" style="background:' + s.color + '22;color:' + s.color + '">🏥 Caso Clinico</div><div class="lab-title">' + c.title + '</div></div>' +
    '<div style="background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:20px;font-size:.86rem;color:var(--text3);line-height:1.6"><strong>Paciente:</strong> ' + c.patient + '</div>' +
    '<div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:' + s.color + ';margin-bottom:8px">Paso ' + (s.current+1) + ' de ' + c.steps.length + '</div>' +
    '<div class="quiz-progress-bar" style="margin-bottom:16px"><div style="height:100%;border-radius:3px;background:' + s.color + ';width:' + (((s.current+1)/c.steps.length)*100) + '%;transition:width .4s"></div></div>' +

    '<div class="quiz-options">' + optHtml + '</div>' +
    '<div class="quiz-explanation ' + (answered?'visible':'') + '" style="--accent:' + s.color + '">' + (answered?md('**Explicacion:** '+step.explanation):'') + '</div>' +
    (answered ? '<div style="text-align:center;margin-top:16px"><button class="quiz-nav-btn primary" style="background:' + s.color + '" id="clinicalNext">' + (s.current < c.steps.length - 1 ? 'Siguiente paso →' : '📊 Ver resultados') + '</button></div>' : '');
  if (!answered) {
    document.querySelectorAll('[data-ci]').forEach(function(o) {
      o.onclick = function() {
        s.answers[s.current] = +o.dataset.ci;

      };

  }
  var nb = document.getElementById('clinicalNext');
  if (nb) nb.onclick = function() { s.current++; renderClinicalStep(); };
}
function renderClinicalResults() {
  var s = clinicalState;
  var c = s.data;
  var correct = 0;
  c.steps.forEach(function(step, i) { if (s.answers[i] === step.correct) correct++; });
  var pct = Math.round((correct / c.steps.length) * 100);

  c.steps.forEach(function(step, i) {

var flashState = null;
async function openFlashcards(topic, area) {
  if (!isPremium() && STATIC_FLASHCARDS[area.id] && STATIC_FLASHCARDS[area.id].length > 0) {
    openFullModal('flashcardModal');
    var cards = STATIC_FLASHCARDS[area.id].map(function(c,i){ return {front:c.front,back:c.back,box:0,nextReview:0,id:i}; });
    window._flashState = {cards:cards,current:0,topic:topic,area:area,color:area.color};
    renderFlashcard();
    return;
  }
  if (!isPremium()) { openFullModal('flashcardModal'); showPremiumGate(document.getElementById('flashcardModalContent'), 'Flashcards con IA'); return; }
  openFullModal('flashcardModal');
  var color = area.color;
  var cont = document.getElementById('flashcardModalContent');
  var topicKey = 'fc_' + topic.name.replace(/\s/g, '_');
  var saved = getFlashcardState(topicKey);

  if (saved && saved.cards && saved.cards.length > 0) {
    flashState = { cards: saved.cards, boxes: saved.boxes || saved.cards.map(function() { return 1; }), current: 0, color: color, topic: topic, topicKey: topicKey, flipped: false };
    sortFlashcards();
    renderFlashcard();
    return;
  }

  cont.innerHTML = '<div style="text-align:center;padding:40px"><div class="lab-spinner" style="border-top-color:' + color + ';width:40px;height:40px;border:3px solid var(--card-border);border-top-color:' + color + ';border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div><div style="color:var(--text5)">Generando flashcards sobre ' + topic.name + '...</div></div>';

  var prompt = 'Genera exactamente 10 flashcards sobre "' + topic.name + '" en odontologia. Responde UNICAMENTE en JSON valido:\n[{"front":"Pregunta o concepto","back":"Respuesta detallada"}]\nEn espanol con terminologia tecnica. Variedad: definiciones, mecanismos, protocolos, datos clinicos.';
  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var cards = JSON.parse(jsonMatch[0]).slice(0, 10);
    var boxes = cards.map(function() { return 1; });
    flashState = { cards: cards, boxes: boxes, current: 0, color: color, topic: topic, topicKey: topicKey, flipped: false };
    setFlashcardState(topicKey, { cards: cards, boxes: boxes });
    renderFlashcard();
  } catch (err) {
    cont.innerHTML = '<div style="color:#f87171;padding:20px">Error: ' + err.message + '</div>';
  }
}
function sortFlashcards() {
  // Leitner: lower boxes come first
  var indices = flashState.cards.map(function(_, i) { return i; });
  indices.sort(function(a, b) { return flashState.boxes[a] - flashState.boxes[b]; });
  var newCards = indices.map(function(i) { return flashState.cards[i]; });
  var newBoxes = indices.map(function(i) { return flashState.boxes[i]; });
  flashState.cards = newCards;
  flashState.boxes = newBoxes;
}
function renderFlashcard() {
  var s = flashState;
  var cont = document.getElementById('flashcardModalContent');
  var mastered = s.boxes.filter(function(b) { return b >= 4; }).length;
  var remaining = s.cards.length - mastered;
  var card = s.cards[s.current];
  cont.innerHTML =
    '<div style="text-align:center;margin-bottom:16px"><div class="quiz-badge" style="background:' + s.color + '22;color:' + s.color + '">🃏 Flashcards</div><div class="lab-title">' + s.topic.name + '</div></div>' +
    '<div class="flashcard-progress">Tarjeta ' + (s.current+1) + ' de ' + s.cards.length + ' · ✅ Dominadas: ' + mastered + ' · 📚 Pendientes: ' + remaining + ' · Box: ' + s.boxes[s.current] + '</div>' +
    '<div class="flashcard-container"><div class="flashcard' + (s.flipped ? ' flipped' : '') + '" id="flashcardEl">' +
      '<div class="flashcard-face flashcard-front" style="border-color:' + s.color + '44"><h3 style="color:' + s.color + '">Pregunta</h3><p>' + md(card.front) + '</p><div style="margin-top:16px;font-size:.72rem;color:var(--text6)">Click para voltear</div></div>' +
      '<div class="flashcard-face flashcard-back" style="border-color:' + s.color + '44"><h3 style="color:' + s.color + '">Respuesta</h3><p>' + md(card.back) + '</p></div>' +
    '</div></div>' +
    (s.flipped ? '<div class="flashcard-rating"><button style="background:#22c55e" onclick="rateFlashcard(\'easy\')">😎 Facil</button><button style="background:#f59e0b" onclick="rateFlashcard(\'medium\')">🤔 Medio</button><button style="background:#ef4444" onclick="rateFlashcard(\'hard\')">😰 Dificil</button></div>' : '') +
    '<div style="display:flex;justify-content:center;gap:12px;margin-top:20px"><button class="quiz-nav-btn sec" onclick="closeFullModal(\'flashcardModal\')">✕ Cerrar</button><button class="quiz-nav-btn sec" onclick="resetFlashcards()">🔄 Regenerar</button></div>';
  var fc = document.getElementById('flashcardEl');
  if (fc) fc.onclick = function() { s.flipped = !s.flipped; renderFlashcard(); };
}
function rateFlashcard(rating) {
  var s = flashState;
  if (rating === 'easy') s.boxes[s.current] = Math.min(s.boxes[s.current] + 2, 5);
  else if (rating === 'medium') s.boxes[s.current] = Math.min(s.boxes[s.current] + 1, 5);
  else s.boxes[s.current] = Math.max(s.boxes[s.current] - 1, 1);
  setFlashcardState(s.topicKey, { cards: s.cards, boxes: s.boxes });
  s.flipped = false;
  s.current = (s.current + 1) % s.cards.length;
  renderFlashcard();
}
function resetFlashcards() {
  if (flashState) {
    setFlashcardState(flashState.topicKey, null);
    openFlashcards(flashState.topic, { color: flashState.color });
  }
}

// 5. MIXED EXAM MODE
// ══════════════════════════════════════════════
var examState = null;
var examTimerInterval = null;
document.getElementById('btnExam').onclick = function() { startExam(); };

async function startExam() {
  if (!isPremium()) { showPremiumGate(document.getElementById('examModalContent'), 'Examen Mixto de 30 preguntas'); return; }
  openFullModal('examModal');
  var cont = document.getElementById('examModalContent');
  cont.innerHTML = '<div style="text-align:center;padding:40px"><div class="lab-spinner" style="border-top-color:#7c3aed;width:40px;height:40px;border:3px solid var(--card-border);border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div><div style="color:var(--text5)">Generando examen mixto de 30 preguntas...</div></div>';

  var allTopics = [];
  DATA.forEach(function(area) {
    area.topics.forEach(function(t) {
      allTopics.push({ name: t.name, areaId: area.id, areaTitle: area.title, color: area.color });
    });
  });

  // Pick 5 random topics to generate 6 questions each = 30
  var shuffled = allTopics.sort(function() { return Math.random() - 0.5; }).slice(0, 5);
  var topicNames = shuffled.map(function(t) { return t.name; }).join(', ');

  var prompt = 'Genera exactamente 30 preguntas de opcion multiple para un examen mixto de odontologia. Los temas son: ' + topicNames + '. 6 preguntas por tema. Nivel avanzado.\nResponde UNICAMENTE en JSON valido:\n[{"q":"Pregunta","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0,"explanation":"Explicacion","topic":"Nombre del tema exacto"}]\nEn espanol con terminologia tecnica en *ingles*.';

  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var questions = JSON.parse(jsonMatch[0]).slice(0, 30);
    examState = {
      questions: questions,
      answers: new Array(questions.length).fill(null),
      current: 0,
      topicMap: {},
      timeLeft: 45 * 60
    };
    shuffled.forEach(function(t) { examState.topicMap[t.name] = t; });
    startExamTimer();
    renderExamQ();
  } catch (err) {
    cont.innerHTML = '<div style="color:#f87171;padding:20px">Error: ' + err.message + '</div>';
  }
}
function startExamTimer() {
  if (examTimerInterval) clearInterval(examTimerInterval);
  examTimerInterval = setInterval(function() {
    examState.timeLeft--;
    var timerEl = document.getElementById('examTimer');
    if (timerEl) {
      var min = Math.floor(examState.timeLeft / 60);
      var sec = examState.timeLeft % 60;
      timerEl.textContent = (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;
      timerEl.className = 'exam-timer' + (examState.timeLeft < 300 ? ' danger' : examState.timeLeft < 600 ? ' warning' : '');
    }
    if (examState.timeLeft <= 0) {
      clearInterval(examTimerInterval);
      renderExamResults();
    }
  }, 1000);
}
function renderExamQ() {
  var s = examState;
  var q = s.questions[s.current];
  var n = s.current + 1;
  var total = s.questions.length;
  var answered = s.answers[s.current] !== null;
  var min = Math.floor(s.timeLeft / 60);
  var sec = s.timeLeft % 60;
  var letters = ['A','B','C','D'];
  var optHtml = '';
  q.options.forEach(function(opt, i) {
    var cls = 'quiz-opt';
    if (answered) { cls += ' locked'; if (i===q.correct) cls += ' correct'; else if (i===s.answers[s.current] && i!==q.correct) cls += ' wrong'; }
    optHtml += '<div class="' + cls + '" data-ei="' + i + '"><div class="opt-letter">' + letters[i] + '</div><div class="opt-text">' + md(opt.replace(/^[A-D]\)\s*/,'')) + '</div></div>';
  });
  var cont = document.getElementById('examModalContent');
  cont.innerHTML =
    '<div style="text-align:center;margin-bottom:16px"><div class="quiz-badge" style="background:#7c3aed22;color:#7c3aed">📝 Examen Mixto</div></div>' +
    '<div class="exam-timer" id="examTimer">' + (min<10?'0':'') + min + ':' + (sec<10?'0':'') + sec + '</div>' +
    '<div class="quiz-progress-bar"><div style="height:100%;border-radius:3px;background:#7c3aed;width:' + ((n/total)*100) + '%;transition:width .4s"></div></div>' +
    '<div style="font-size:.72rem;color:var(--text6);text-align:right;margin:6px 0">' + n + ' / ' + total + '</div>' +
    '<div style="font-size:.72rem;color:var(--text5);margin-bottom:8px">Tema: ' + (q.topic || 'Mixto') + '</div>' +
    '<div class="quiz-q-text">' + md(q.q) + '</div>' +
    '<div class="quiz-options">' + optHtml + '</div>' +
    '<div class="quiz-explanation ' + (answered?'visible':'') + '" style="--accent:#7c3aed">' + (answered?md('**Explicacion:** '+q.explanation):'') + '</div>' +
    '<div class="quiz-nav">' +
      '<button class="quiz-nav-btn sec" ' + (s.current===0?'disabled':'') + ' id="ePrev">← Anterior</button>' +
      '<div>' +
        (!answered ? '<button class="quiz-nav-btn primary" style="background:#7c3aed" id="eCheck" disabled>Verificar</button>' : '') +
        (answered ? (s.current < total - 1 ? '<button class="quiz-nav-btn primary" style="background:#7c3aed" id="eNext">Siguiente →</button>' : '<button class="quiz-nav-btn primary" style="background:#7c3aed" id="eFinish">📊 Resultados</button>') : '') +
      '</div>' +
    '</div>';
  if (!answered) {
    var sel = null;
    document.querySelectorAll('[data-ei]').forEach(function(o) {
      o.onclick = function() { document.querySelectorAll('[data-ei]').forEach(function(x){x.classList.remove('selected');}); o.classList.add('selected'); sel=+o.dataset.ei; var cb=document.getElementById('eCheck'); if(cb) cb.disabled=false; };
    });
    var cb = document.getElementById('eCheck'); if(cb) cb.onclick = function() { if(sel!==null) { s.answers[s.current]=sel; renderExamQ(); } };
  }
  var pb = document.getElementById('ePrev'); if(pb) pb.onclick = function() { if(s.current>0){s.current--;renderExamQ();} };
  var nb = document.getElementById('eNext'); if(nb) nb.onclick = function() { s.current++; renderExamQ(); };
  var fb = document.getElementById('eFinish'); if(fb) fb.onclick = function() { clearInterval(examTimerInterval); renderExamResults(); };
}
function renderExamResults() {
  if (examTimerInterval) clearInterval(examTimerInterval);
  var s = examState;
  var correct = 0;
  var byTopic = {};
  s.questions.forEach(function(q, i) {
    var ok = s.answers[i] === q.correct;
    if (ok) correct++;
    var t = q.topic || 'Otro';
    if (!byTopic[t]) byTopic[t] = { correct: 0, total: 0 };
    byTopic[t].total++;
    if (ok) byTopic[t].correct++;
  });
  var pct = Math.round((correct / s.questions.length) * 100);
  // Save exam to history
  var examHistory = storeGet(STORE_KEYS.examHistory, []);
  examHistory.push({ score: correct, total: s.questions.length, pct: pct, date: new Date().toISOString(), byTopic: byTopic });
  storeSet(STORE_KEYS.examHistory, examHistory);
  var breakdownHtml = '';
  Object.keys(byTopic).forEach(function(topic) {
    var d = byTopic[topic];
    var tpct = Math.round((d.correct / d.total) * 100);
    var clr = tpct >= 80 ? '#22c55e' : tpct >= 50 ? '#f59e0b' : '#ef4444';
    breakdownHtml += '<div class="rb-item"><div class="rb-icon" style="background:' + clr + '22;color:' + clr + '">' + tpct + '%</div><div class="rb-text">' + topic + ' (' + d.correct + '/' + d.total + ')</div></div>';
  });
  var cont = document.getElementById('examModalContent');
  cont.innerHTML =
    '<div class="quiz-results"><div class="quiz-badge" style="background:#7c3aed22;color:#7c3aed">📝 Examen Mixto — Resultados</div><div class="results-score" style="color:' + (pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444') + '">' + pct + '%</div><div class="results-label">' + correct + '/' + s.questions.length + ' correctas</div></div>' +
    '<div class="results-breakdown"><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">Desglose por area</div>' + breakdownHtml + '</div>' +
    '<div class="results-actions"><button class="quiz-nav-btn primary" style="background:#7c3aed" onclick="startExam()">🔄 Nuevo examen</button><button class="quiz-nav-btn sec" onclick="clearInterval(examTimerInterval);closeFullModal(\'examModal\')">✕ Cerrar</button></div>';
}

// ══════════════════════════════════════════════
// 2. WEAKNESS MAP / PROGRESS DASHBOARD
// ══════════════════════════════════════════════
document.getElementById('btnProgress').onclick = function() { renderProgressDashboard(); };

function renderProgressDashboard() {
  openFullModal('progressModal');
  var cont = document.getElementById('progressModalContent');
  var history = storeGet(STORE_KEYS.quizHistory, []);
  var examHistory = storeGet(STORE_KEYS.examHistory, []);

  // Calculate per-topic best scores
  var topicScores = {};
  history.forEach(function(h) {
    var pct = Math.round((h.score / h.total) * 100);
    if (!topicScores[h.topicName] || pct > topicScores[h.topicName].pct) {
      topicScores[h.topicName] = { pct: pct, date: h.date, areaId: h.areaId };
    }
  });

  // Overall score
  var allPcts = Object.values(topicScores).map(function(v) { return v.pct; });
  var overallPct = allPcts.length > 0 ? Math.round(allPcts.reduce(function(a,b){return a+b;},0) / allPcts.length) : 0;

  // Build topic list
  var topicListHtml = '';
  var weakTopics = [];
  DATA.forEach(function(area) {
    topicListHtml += '<div style="margin-top:16px;font-size:.82rem;font-weight:800;color:' + area.color + '">' + area.icon + ' ' + area.title + '</div>';
    area.topics.forEach(function(t) {
      var sc = topicScores[t.name];
      var emoji = '⚪';
      var pctText = 'No intentado';
      var pctVal = -1;
      if (sc) {
        pctVal = sc.pct;
        if (sc.pct > 80) emoji = '🟢';
        else if (sc.pct >= 50) emoji = '🟡';
        else emoji = '🔴';
        pctText = sc.pct + '% (' + new Date(sc.date).toLocaleDateString('es') + ')';
      }
      weakTopics.push({ name: t.name, pct: pctVal, area: area.title });
      topicListHtml += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.84rem"><span>' + emoji + '</span><span style="flex:1;color:var(--text2)">' + t.name + '</span><span style="color:var(--text5);font-size:.78rem">' + pctText + '</span></div>';
    });
  });

  // Suggested study order (weakest first)
  weakTopics.sort(function(a, b) { return a.pct - b.pct; });
  var suggestedHtml = '';
  weakTopics.slice(0, 10).forEach(function(t, i) {
    suggestedHtml += '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.82rem"><span style="color:var(--text5);font-weight:800">' + (i+1) + '.</span><span style="flex:1;color:var(--text2)">' + t.name + '</span><span style="color:var(--text6);font-size:.76rem">' + (t.pct >= 0 ? t.pct + '%' : 'Pendiente') + '</span></div>';
  });

  // Quiz history timeline
  var timelineHtml = '';
  var recent = history.slice(-10).reverse();
  recent.forEach(function(h) {
    var d = new Date(h.date);
    var p = Math.round((h.score/h.total)*100);
    var clr = p >= 80 ? '#22c55e' : p >= 50 ? '#f59e0b' : '#ef4444';
    timelineHtml += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.82rem"><span style="color:' + clr + ';font-weight:800;min-width:40px">' + p + '%</span><span style="flex:1;color:var(--text2)">' + h.topicName + '</span><span style="color:var(--text6);font-size:.72rem">' + d.toLocaleDateString('es') + ' ' + d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) + '</span></div>';
  });

  cont.innerHTML =
    '<div style="text-align:center;margin-bottom:24px"><div class="quiz-badge" style="background:#7c3aed22;color:#7c3aed">📊 Mi Progreso</div><div class="results-score" style="color:' + (overallPct>=70?'#22c55e':overallPct>=50?'#f59e0b':'#ef4444') + '">' + overallPct + '%</div><div class="results-label">Puntuacion general · ' + allPcts.length + ' temas evaluados de ' + weakTopics.length + '</div></div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px">' +
      '<div><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">Mapa de temas</div>' + topicListHtml + '</div>' +
      '<div><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">📌 Orden de estudio sugerido (debilidades primero)</div>' + suggestedHtml +
        (timelineHtml ? '<div style="margin-top:24px;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">🕐 Historial reciente</div>' + timelineHtml : '') +
        (examHistory.length > 0 ? '<div style="margin-top:24px;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:800;color:var(--text4);margin-bottom:10px">📝 Examenes</div>' + examHistory.slice(-5).reverse().map(function(e) { return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.82rem"><span style="color:' + (e.pct>=70?'#22c55e':e.pct>=50?'#f59e0b':'#ef4444') + ';font-weight:800">' + e.pct + '%</span><span style="color:var(--text5)">' + new Date(e.date).toLocaleDateString('es') + '</span></div>'; }).join('') : '') +
      '</div>' +
    '</div>';
}

// ══════════════════════════════════════════════
// 10. AI STUDY CALENDAR
// ══════════════════════════════════════════════
document.getElementById('btnCalendar').onclick = function() { openCalendarModal(); };

function openCalendarModal() {
  if (!isPremium()) { openFullModal('calendarModal'); showPremiumGate(document.getElementById('calendarModalContent'), 'Plan de Estudio con IA'); return; }
  openFullModal('calendarModal');
  var cont = document.getElementById('calendarModalContent');
  cont.innerHTML =
    '<div style="text-align:center;margin-bottom:20px"><div class="quiz-badge" style="background:#f59e0b22;color:#f59e0b">📅 Plan de Estudio</div><div class="lab-title">Genera tu plan personalizado</div></div>' +
    '<div style="text-align:center;margin:30px 0">' +
      '<label style="font-size:.88rem;color:var(--text3)">¿Cuando es tu examen?</label><br>' +
      '<input type="date" id="examDateInput" style="margin-top:10px;padding:10px 18px;border-radius:10px;border:1px solid var(--line);background:var(--input-bg);color:var(--text);font-size:1rem;outline:none">' +
      '<br><button class="quiz-nav-btn primary" style="background:#f59e0b;margin-top:16px" id="genCalendarBtn">✦ Generar plan con IA</button>' +
    '</div>';
  document.getElementById('genCalendarBtn').onclick = generateStudyCalendar;
}

async function generateStudyCalendar() {
  var dateInput = document.getElementById('examDateInput');
  if (!dateInput.value) { alert('Selecciona una fecha de examen'); return; }
  var examDate = new Date(dateInput.value);
  var today = new Date();
  var daysUntil = Math.max(1, Math.ceil((examDate - today) / (1000*60*60*24)));
  var weeks = Math.max(1, Math.ceil(daysUntil / 7));

  var cont = document.getElementById('calendarModalContent');
  cont.innerHTML = '<div style="text-align:center;padding:40px"><div class="lab-spinner" style="border-top-color:#f59e0b;width:40px;height:40px;border:3px solid var(--card-border);border-top-color:#f59e0b;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div><div style="color:var(--text5)">Generando plan de estudio para ' + weeks + ' semanas...</div></div>';

  // Build weakness info
  var history = storeGet(STORE_KEYS.quizHistory, []);
  var topicScores = {};
  history.forEach(function(h) {
    var pct = Math.round((h.score / h.total) * 100);
    if (!topicScores[h.topicName] || pct > topicScores[h.topicName]) topicScores[h.topicName] = pct;
  });
  var weaknessInfo = '';
  DATA.forEach(function(area) {
    area.topics.forEach(function(t) {
      var sc = topicScores[t.name];
      weaknessInfo += t.name + ': ' + (sc !== undefined ? sc + '%' : 'no evaluado') + '\n';
    });
  });

  var prompt = 'Genera un plan de estudio semanal de odontologia. Faltan ' + daysUntil + ' dias (' + weeks + ' semanas) para el examen. Datos de debilidades del estudiante:\n' + weaknessInfo + '\nResponde UNICAMENTE en JSON valido:\n[{"week":1,"days":[{"day":"Lunes","topics":["Tema 1","Tema 2"],"focus":"Descripcion breve del enfoque"},{"day":"Martes","topics":["Tema"],"focus":"..."}]}]\nMaximo ' + Math.min(weeks, 6) + ' semanas. Prioriza temas debiles. En espanol. Incluye dias de repaso.';

  try {
    var raw = await askAI([{role:'user',content:prompt}]);
    var jsonMatch = raw.match(/\[[\s\S]*\]/); if (!jsonMatch) throw new Error('Parse error');
    var plan = JSON.parse(jsonMatch[0]);
    renderCalendar(plan, examDate);
  } catch (err) {
    cont.innerHTML = '<div style="color:#f87171;padding:20px">Error: ' + err.message + '</div>';
  }
}

function renderCalendar(plan, examDate) {
  var cont = document.getElementById('calendarModalContent');
  var html = '<div style="text-align:center;margin-bottom:20px"><div class="quiz-badge" style="background:#f59e0b22;color:#f59e0b">📅 Plan de Estudio</div><div class="lab-title">Tu calendario personalizado</div><div style="color:var(--text5);font-size:.82rem;margin-top:6px">Examen: ' + examDate.toLocaleDateString('es', {weekday:'long',year:'numeric',month:'long',day:'numeric'}) + '</div></div>';

  plan.forEach(function(week) {
    html += '<div style="margin-top:20px"><div style="font-size:.82rem;font-weight:800;color:var(--text4);margin-bottom:10px">Semana ' + week.week + '</div><div class="calendar-grid">';
    (week.days || []).forEach(function(day) {
      var topicsHtml = (day.topics || []).map(function(t) {
        return '<div class="day-topic" style="background:var(--line)">' + t + '</div>';
      }).join('');
      html += '<div class="calendar-day"><div class="day-label">' + day.day + '</div>' + topicsHtml + '<div style="font-size:.64rem;color:var(--text6);margin-top:4px">' + (day.focus || '') + '</div></div>';
    });
    html += '</div></div>';
  });

  html += '<div style="text-align:center;margin-top:20px"><button class="quiz-nav-btn sec" onclick="openCalendarModal()">🔄 Regenerar</button></div>';
  cont.innerHTML = html;
}

// ══════════════════════════════════════════════
// AREA MODAL
// ══════════════════════════════════════════════
function openAreaModal(item) {
  document.getElementById('modalContent').innerHTML =
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px"><span style="font-size:2rem">' + item.icon + '</span><div><h2 style="color:' + item.color + ';font-size:1.3rem">' + item.title + '</h2><div style="color:var(--text5);font-size:.8rem">' + item.subtitle + '</div></div></div>' +
    '<p style="color:var(--text4);font-size:.88rem;line-height:1.6;margin-bottom:20px">' + item.description + '</p>' +
    item.topics.map(function(t) { return '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.85rem"><span style="color:' + item.color + '">▸</span><div><strong>' + t.name + '</strong><div style="color:var(--text6);font-size:.78rem;margin-top:2px">' + t.desc + '</div></div></div>'; }).join('');
  document.getElementById('modalOverlay').classList.add('active');
}

// ══════════════════════════════════════════════
// TIMELINE
// ══════════════════════════════════════════════
function renderTimeline() {
  var section = document.querySelector('.timeline-section');
  var tl = document.getElementById('timeline');
  tl.style.display = 'none';
  section.querySelector('h2').innerHTML = '📍 Ruta de Aprendizaje <span style="font-size:var(--fs-xs);color:var(--text5);cursor:pointer;font-weight:500" id="timelineToggle">(click para expandir)</span>';
  var TIMELINE_DATA = TIMELINE;
  TIMELINE_DATA.forEach(function(item, i) {
    var el = document.createElement('div'); el.className = 'timeline-item';
    el.innerHTML = '<div class="tl-label" style="color:' + item.color + '">' + item.label + '</div><div class="tl-title">' + item.title + '</div><div class="tl-desc">' + item.desc + '</div>';
    tl.appendChild(el);
    var s = document.createElement('style');
    s.textContent = '.timeline-item:nth-child(' + (i+1) + ')::before{content:\'\';width:10px;height:10px;background:' + item.color + ';border-color:' + item.color + ';border-radius:50%;position:absolute;left:-26px;top:6px;border:2px solid}';
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════
document.getElementById('modalClose').onclick = function() { document.getElementById('modalOverlay').classList.remove('active'); };
document.getElementById('modalOverlay').onclick = function(e) { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('labClose').onclick = function() { document.getElementById('labOverlay').classList.remove('active'); };
document.getElementById('labOverlay').onclick = function(e) { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('quizClose').onclick = function() { document.getElementById('quizOverlay').classList.remove('active'); };
document.getElementById('quizOverlay').onclick = function(e) { if(e.target===e.currentTarget) e.currentTarget.classList.remove('active'); };
document.getElementById('searchInput').oninput = function(e) { renderGrid(e.target.value.toLowerCase().trim()); };

// Close full modals on background click
document.querySelectorAll('.full-modal').forEach(function(modal) {
  modal.onclick = function(e) {
    if (e.target === modal) {
      modal.classList.remove('active');
      if (examTimerInterval && modal.id === 'examModal') clearInterval(examTimerInterval);
    }
  };
});

document.onkeydown = function(e) {
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay,.modal-overlay,.lightbox,.full-modal').forEach(function(o){o.classList.remove('active');});
    if (examTimerInterval) clearInterval(examTimerInterval);
  }
  if(e.key==='/'&&['INPUT','TEXTAREA'].indexOf(document.activeElement.tagName)===-1){e.preventDefault();document.getElementById('searchInput').focus();}
};

renderProgress(); renderGrid(); setTimeout(renderTimeline, 100);
var tlToggle = document.getElementById('timelineToggle');
if(tlToggle) tlToggle.onclick = function() { var t=document.getElementById('timeline'); t.style.display = t.style.display==='none'?'block':'none'; };

</script>
